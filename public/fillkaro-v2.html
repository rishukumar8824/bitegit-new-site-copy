<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fillkaro — Student App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --bl:#1A6FFF;--bl2:#0044CC;--cy:#00CFFF;
  --gd:#FFB800;--gd2:#FFD84D;
  --gn:#00C853;--rd:#FF3B55;--am:#FF9500;--pu:#7B5EA7;
  --bg:#04040C;--card:#0C1028;--card2:#0E1232;
  --mu:rgba(255,255,255,0.38);
  --bd:rgba(255,255,255,0.065);--bd2:rgba(255,255,255,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:radial-gradient(ellipse 55% 40% at 18% 8%,rgba(26,111,255,0.2) 0%,transparent 55%),
    radial-gradient(ellipse 45% 45% at 88% 92%,rgba(255,184,0,0.07) 0%,transparent 55%),#050510;
  display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Inter',sans-serif;overflow:hidden;
}
.phone{
  width:390px;height:820px;border-radius:52px;position:relative;overflow:hidden;flex-shrink:0;background:#000;
  transform-origin:center center;
  box-shadow:0 0 0 1px rgba(255,255,255,0.11),0 0 0 10px #111,0 0 0 12px rgba(255,255,255,0.04),
    0 50px 130px rgba(26,111,255,0.28),0 100px 220px rgba(0,0,0,0.85);
}
.phone::before{content:'';position:absolute;left:-13px;top:115px;width:4px;height:34px;background:#191919;border-radius:3px 0 0 3px;box-shadow:0 48px 0 #191919,0 94px 0 #191919;}
.phone::after{content:'';position:absolute;right:-13px;top:162px;width:4px;height:68px;background:#191919;border-radius:0 3px 3px 0;}
.screen{position:absolute;top:0;left:0;right:0;bottom:74px;border-radius:52px 52px 0 0;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);}
.sb{height:50px;flex-shrink:0;position:relative;background:transparent;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 8px;z-index:50;}
.di{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:118px;height:32px;background:#000;border-radius:18px;pointer-events:none;}
.sb-t{font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.sb-ic{display:flex;gap:6px;align-items:center;}
.hdr{flex-shrink:0;padding:10px 18px;display:flex;align-items:center;gap:10px;background:rgba(4,4,12,0.82);backdrop-filter:blur(32px);border-bottom:1px solid rgba(255,255,255,0.055);}
.hdr-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(145deg,var(--bl),var(--pu));display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;box-shadow:0 0 0 2px rgba(26,111,255,0.35),0 0 20px rgba(26,111,255,0.28);transition:transform 0.18s;position:relative;}
.hdr-av:active{transform:scale(0.88);}
.av-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--gn);border-radius:50%;border:2px solid var(--bg);}
.hdr-mid{flex:1;}
.logo-t{font-size:21px;font-weight:900;color:#fff;letter-spacing:-0.7px;line-height:1;}
.hdr-sub{font-size:10px;color:var(--mu);font-weight:500;margin-top:1px;}
.hdr-acts{display:flex;gap:7px;}
.hdr-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all 0.15s;flex-shrink:0;}
.hdr-btn:active{transform:scale(0.86);}
.notif-pip{position:absolute;top:8px;right:8px;width:7px;height:7px;background:var(--rd);border-radius:50%;border:1.5px solid var(--bg);animation:pulse-r 1.4s infinite;}
.body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;min-height:0;}
.body::-webkit-scrollbar{display:none;}
.bnav{position:absolute;bottom:0;left:0;right:0;height:74px;background:rgba(4,4,12,0.97);border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-around;align-items:flex-start;padding:10px 6px 0;z-index:420;border-radius:0 0 52px 52px;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;position:relative;}
.ni-ico{font-size:23px;opacity:0.3;transition:opacity 0.2s,transform 0.22s;}
.ni.a .ni-ico{opacity:1;transform:scale(1.1);}
.ni-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.28);transition:color 0.2s;}
.ni.a .ni-lbl{color:var(--bl);}
.ni-badge{position:absolute;top:0px;right:calc(50% - 24px);width:16px;height:16px;background:var(--rd);border-radius:50%;font-size:9px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
.ni-dot{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:22px;height:3px;background:linear-gradient(90deg,var(--bl),var(--cy));border-radius:0 0 3px 3px;opacity:0;transition:opacity 0.2s;}
.ni.a .ni-dot{opacity:1;}
.panel{position:absolute;inset:0;border-radius:52px;z-index:200;transform:translateX(100%);transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);overflow:hidden;background:var(--bg);}
.panel.open{transform:translateX(0);}
.p-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.065);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:17px;transition:transform 0.15s;flex-shrink:0;}
.p-back:active{transform:scale(0.88);}
.p-scroll{overflow-y:auto;scrollbar-width:none;padding:16px 20px 32px;height:calc(100% - 120px);}
.p-scroll::-webkit-scrollbar{display:none;}
.hero{padding:14px 20px 0;position:relative;}
.h-glow-a{position:absolute;top:-80px;left:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(26,111,255,0.18) 0%,transparent 65%);pointer-events:none;}
.h-glow-b{position:absolute;top:-20px;right:-50px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,184,0,0.08) 0%,transparent 65%);pointer-events:none;}
.h-greet{font-size:12px;color:rgba(255,255,255,0.6);font-weight:600;margin-bottom:5px;letter-spacing:0.2px;}
.h1{font-size:26px;font-weight:900;color:#fff;line-height:1.08;letter-spacing:-0.8px;position:relative;z-index:1;}
.h1 .g-bl{background:linear-gradient(130deg,#5599FF,var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.h1 .g-gd{background:linear-gradient(130deg,var(--gd),var(--gd2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.h-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:6px;line-height:1.5;position:relative;z-index:1;}
.ticker-strap{overflow:hidden;background:rgba(255,255,255,0.025);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:7px 0;margin-top:10px;}
.ticker-inner{display:flex;animation:ticker-run 24s linear infinite;width:max-content;}
.ticker-inner:hover{animation-play-state:paused;}
.ticker-item{display:flex;align-items:center;gap:6px;padding:0 16px;border-right:1px solid var(--bd);white-space:nowrap;}
.ti-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ti-cat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}
.ti-nm{font-size:11px;font-weight:600;color:rgba(255,255,255,0.72);}
.cta-wrap{padding:12px 20px 0;}
.btn-main{width:100%;padding:15px;border:none;border-radius:15px;background:linear-gradient(135deg,#1A6FFF 0%,#0044BB 50%,#5500AA 100%);color:#fff;font-size:14px;font-weight:800;letter-spacing:-0.3px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:9px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(26,111,255,0.45),0 2px 0 rgba(255,255,255,0.08) inset;animation:btn-glow 3s ease-in-out infinite;}
.btn-main::before{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.09),transparent);animation:shine 3.5s 1s ease-in-out infinite;}
.live-dot{width:7px;height:7px;background:var(--rd);border-radius:50%;animation:pulse-r 1.1s infinite;flex-shrink:0;}
.stats{margin:10px 20px 0;display:flex;background:var(--card);border:1px solid var(--bd2);border-radius:16px;overflow:hidden;}
.st{flex:1;padding:11px 6px;text-align:center;border-right:1px solid var(--bd);}
.st:last-child{border-right:none;}
.st-n{font-size:17px;font-weight:900;letter-spacing:-0.5px;}
.st-l{font-size:9px;color:var(--mu);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.lf-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;}
.lf-left{display:flex;align-items:center;gap:8px;}
.lf-live{display:flex;align-items:center;gap:5px;background:rgba(255,59,85,0.12);border:1px solid rgba(255,59,85,0.22);border-radius:20px;padding:4px 10px;}
.lf-live-t{font-size:10px;font-weight:800;color:var(--rd);}
.lf-title{font-size:14px;font-weight:900;color:#fff;letter-spacing:-0.3px;}
.lf-see{font-size:11px;font-weight:700;color:var(--bl);cursor:pointer;}
.lf-scroll{display:flex;gap:8px;overflow-x:auto;padding:10px 20px 4px;scrollbar-width:none;}
.lf-scroll::-webkit-scrollbar{display:none;}
.lf-card{flex-shrink:0;width:148px;background:var(--card);border:1px solid var(--bd2);border-radius:14px;padding:10px;cursor:pointer;}
.lfc-top{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.lfc-ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.lfc-cat{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:1px;}
.lfc-nm{font-size:11px;font-weight:800;color:#fff;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lfc-meta{display:flex;background:rgba(255,255,255,0.04);border-radius:8px;overflow:hidden;margin-bottom:8px;}
.lfc-m{flex:1;padding:5px 3px;text-align:center;border-right:1px solid rgba(255,255,255,0.05);}
.lfc-m:last-child{border-right:none;}
.lfc-mv{font-size:9px;font-weight:800;color:#fff;}
.lfc-ml{font-size:7px;color:var(--mu);margin-top:1px;font-weight:600;text-transform:uppercase;}
.lfc-btn{width:100%;padding:6px;background:linear-gradient(135deg,var(--bl),var(--bl2));border:none;border-radius:9px;color:#fff;font-size:10px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
.ai-tip{margin:13px 20px 0;padding:14px;background:linear-gradient(135deg,rgba(123,94,167,0.18),rgba(26,111,255,0.1));border:1px solid rgba(123,94,167,0.2);border-radius:18px;display:flex;gap:11px;}
.at-ico{font-size:22px;flex-shrink:0;}
.at-t{font-size:12px;font-weight:800;color:#fff;margin-bottom:4px;}
.at-s{font-size:11px;color:rgba(255,255,255,0.4);line-height:1.65;}
.search-wrap{display:flex;gap:8px;margin:13px 20px 0;background:var(--card);border:1px solid var(--bd2);border-radius:14px;padding:5px 5px 5px 15px;align-items:center;}
.s-inp{flex:1;background:none;border:none;outline:none;color:#fff;font-size:13px;font-family:'Inter',sans-serif;}
.s-inp::placeholder{color:rgba(255,255,255,0.22);}
.s-go{width:38px;height:38px;border-radius:11px;background:var(--bl);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cat-row{display:flex;gap:7px;padding:11px 20px 0;overflow-x:auto;scrollbar-width:none;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-p{flex-shrink:0;padding:7px 15px;border-radius:22px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s;}
.cat-p.on{background:var(--bl);color:#fff;box-shadow:0 4px 18px rgba(26,111,255,0.38);}
.cat-p.off{background:rgba(255,255,255,0.05);color:var(--mu);border:1px solid var(--bd);}
.exam-list{padding:10px 20px 0;display:flex;flex-direction:column;gap:6px;}
.ec{background:var(--card);border:1px solid var(--bd2);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform 0.15s;}
.ec:active{transform:scale(0.97);}
.ec-row{display:flex;align-items:center;gap:11px;padding:12px 14px;}
.ec-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.ec-name{font-size:13px;font-weight:800;color:#fff;letter-spacing:-0.2px;}
.ec-org{font-size:10px;color:var(--mu);margin-top:1px;}
.ec-apply{padding:8px 16px;border-radius:20px;border:none;font-size:11px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;background:linear-gradient(135deg,var(--bl),var(--bl2));color:#fff;box-shadow:0 3px 10px rgba(26,111,255,0.3);flex-shrink:0;white-space:nowrap;}
.ec-bk{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;cursor:pointer;transition:all 0.18s;}
.ec-bk.saved{background:rgba(255,184,0,0.15);border-color:rgba(255,184,0,0.3);}
.storage-card{margin:13px 20px 0;padding:16px;background:var(--card);border:1px solid var(--bd2);border-radius:20px;}
.sc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sc-lbl{font-size:13px;font-weight:700;color:#fff;}
.sc-pct{font-size:12px;color:var(--mu);}
.sc-bar{height:6px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;margin-bottom:11px;}
.sc-fill{height:100%;background:linear-gradient(90deg,var(--bl),var(--pu));border-radius:4px;width:43%;}
.sc-chips{display:flex;gap:10px;flex-wrap:wrap;}
.sc-chip{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu);font-weight:500;}
.sc-dot{width:6px;height:6px;border-radius:50%;}
.upload-cta{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 20px 0;padding:15px;border:1.5px dashed rgba(26,111,255,0.32);border-radius:16px;background:rgba(26,111,255,0.05);color:var(--bl);font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.doc-sec-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:0.9px;padding:14px 20px 8px;}
.doc-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bd2);border-radius:16px;padding:14px;margin:0 20px 9px;cursor:pointer;}
.di-ico{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.di-inf{flex:1;min-width:0;}
.di-nm{font-size:13px;font-weight:700;color:#fff;}
.di-mt{font-size:11px;color:var(--mu);margin-top:2px;}
.di-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.di-sz{font-size:10px;color:var(--mu);}
.di-st{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.s-ok{background:rgba(0,200,83,0.12);color:var(--gn);}
.s-req{background:rgba(255,59,85,0.12);color:var(--rd);}
.doc-pend{border-color:rgba(255,59,85,0.22)!important;border-style:dashed!important;}
.prof-top{background:linear-gradient(180deg,rgba(26,111,255,0.13) 0%,transparent 100%);padding-bottom:4px;}
.prof-av-wrap{display:flex;flex-direction:column;align-items:center;padding:26px 0 20px;}
.prof-av{width:88px;height:88px;border-radius:50%;background:linear-gradient(145deg,var(--bl),var(--pu));display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 0 0 3px rgba(26,111,255,0.3),0 0 50px rgba(26,111,255,0.28);margin-bottom:13px;}
.prof-nm{font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
.prof-id{font-size:12px;color:var(--mu);margin-top:3px;}
.prof-badge{margin-top:10px;background:linear-gradient(135deg,rgba(255,184,0,0.16),rgba(255,184,0,0.05));border:1px solid rgba(255,184,0,0.22);border-radius:22px;padding:6px 16px;font-size:11px;font-weight:800;color:var(--gd);}
.p-mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin:0 20px 16px;}
.pms{background:var(--card);border:1px solid var(--bd2);border-radius:16px;padding:15px 10px;text-align:center;}
.pms-n{font-size:22px;font-weight:900;letter-spacing:-0.8px;}
.pms-l{font-size:9px;color:var(--mu);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;}
.sec-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,0.27);text-transform:uppercase;letter-spacing:0.9px;padding:0 20px 9px;}
.info-blk{background:var(--card);border:1px solid var(--bd2);border-radius:18px;overflow:hidden;margin:0 20px 14px;}
.ir{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.04);}
.ir:last-child{border-bottom:none;}
.ir-ico{width:36px;height:36px;border-radius:11px;background:rgba(26,111,255,0.1);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.ir-inf{flex:1;}
.ir-lbl{font-size:11px;color:var(--mu);font-weight:500;}
.ir-val{font-size:13px;font-weight:700;color:#fff;margin-top:1px;}
.ir-tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;flex-shrink:0;}
.t-bl{background:rgba(26,111,255,0.14);color:var(--bl);}
.t-gn{background:rgba(0,200,83,0.12);color:var(--gn);}
.t-gd{background:rgba(255,184,0,0.12);color:var(--gd);}
.t-rd{background:rgba(255,59,85,0.12);color:var(--rd);}
.t-am{background:rgba(255,149,0,0.12);color:var(--am);}
.ed-panel{position:absolute;inset:0;border-radius:52px;z-index:260;background:var(--bg);transform:translateY(100%);transition:transform 0.42s cubic-bezier(0.32,0.72,0,1);overflow:hidden;display:flex;flex-direction:column;}
.ed-panel.open{transform:translateY(0);}
.ed-hero{position:relative;padding:54px 20px 20px;overflow:hidden;flex-shrink:0;}
.ed-hero-glow{position:absolute;inset:-40px;filter:blur(80px);opacity:0.25;z-index:0;}
.ed-back{position:absolute;top:58px;left:20px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px;z-index:2;}
.ed-badge{position:absolute;top:58px;right:20px;font-size:10px;font-weight:800;padding:5px 12px;border-radius:20px;z-index:2;}
.ed-icon-row{display:flex;align-items:center;gap:14px;margin-bottom:12px;position:relative;z-index:2;}
.ed-icon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.ed-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
.ed-org{font-size:11px;color:var(--mu);margin-top:2px;}
.ed-meta-row{display:flex;gap:7px;flex-wrap:wrap;position:relative;z-index:2;}
.ed-meta-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.06);border:1px solid var(--bd);border-radius:20px;padding:5px 11px;font-size:11px;color:rgba(255,255,255,0.7);font-weight:600;}
.ed-body{flex:1;overflow-y:auto;scrollbar-width:none;padding:16px 20px 20px;}
.ed-body::-webkit-scrollbar{display:none;}
.ed-section{margin-bottom:16px;}
.ed-sec-t{font-size:12px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:9px;}
.ed-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ed-info-cell{background:var(--card);border:1px solid var(--bd2);border-radius:12px;padding:11px 12px;}
.ed-info-lbl{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px;}
.ed-info-val{font-size:13px;font-weight:700;color:#fff;}
.ed-syl-item{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--bd2);border-radius:12px;padding:11px 13px;margin-bottom:7px;}
.ed-syl-n{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.ed-syl-t{font-size:13px;font-weight:700;color:#fff;}
.ed-syl-s{font-size:10px;color:var(--mu);margin-top:1px;}
.ed-cutoff{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.ed-cut-cell{background:var(--card);border:1px solid var(--bd2);border-radius:11px;padding:10px 6px;text-align:center;}
.ed-cut-cat{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:4px;}
.ed-cut-val{font-size:14px;font-weight:900;color:#fff;}
.ed-apply-bar{flex-shrink:0;padding:12px 20px 20px;border-top:1px solid var(--bd);background:rgba(4,4,12,0.95);}
.ed-apply-btn{width:100%;padding:15px;border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 8px 28px rgba(26,111,255,0.4);}
/* ONBOARDING */
.ob-wrap{position:absolute;inset:0;border-radius:52px;z-index:500;overflow:hidden;background:var(--bg);}
.ob-slides{display:flex;width:300%;height:100%;transition:transform 0.45s cubic-bezier(0.32,0.72,0,1);}
.ob-slide{width:33.333%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 0 40px;position:relative;overflow:hidden;}
.ob-visual{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding-bottom:240px;}
.ob-glow{position:absolute;border-radius:50%;filter:blur(60px);}
.ob-icon-wrap{position:relative;z-index:2;}
.ob-icon-ring{position:absolute;inset:-24px;border-radius:50%;border:2px solid;animation:spin 8s linear infinite;}
.ob-icon-ring2{position:absolute;inset:-44px;border-radius:50%;border:1.5px dashed;animation:spin 12s linear reverse infinite;}
.ob-icon{width:100px;height:100px;border-radius:32px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;z-index:2;}
.ob-content{width:100%;padding:0 28px;text-align:center;position:relative;z-index:2;}
.ob-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:16px;}
.ob-h{font-size:28px;font-weight:900;color:#fff;letter-spacing:-0.8px;line-height:1.1;margin-bottom:10px;}
.ob-s{font-size:14px;color:rgba(255,255,255,0.48);line-height:1.65;margin-bottom:28px;}
.ob-dots{display:flex;gap:7px;justify-content:center;margin-bottom:24px;}
.ob-dot{height:6px;border-radius:3px;transition:all 0.35s;}
.ob-dot.act{width:24px;}
.ob-dot.idle{width:6px;background:rgba(255,255,255,0.18);}
.ob-btn{width:100%;padding:17px;border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:-0.3px;}
.ob-skip{position:absolute;top:62px;right:24px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.4);cursor:pointer;z-index:10;padding:8px;}
/* AUTH */
.auth-wrap{position:absolute;inset:0;border-radius:52px;z-index:600;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;}
.auth-glow-a{position:absolute;width:300px;height:300px;top:-80px;left:-60px;background:radial-gradient(circle,rgba(26,111,255,0.25) 0%,transparent 65%);border-radius:50%;pointer-events:none;}
.auth-glow-b{position:absolute;width:200px;height:200px;bottom:100px;right:-50px;background:radial-gradient(circle,rgba(123,94,167,0.2) 0%,transparent 65%);border-radius:50%;pointer-events:none;}
.auth-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;position:relative;z-index:2;}
.auth-logo{width:72px;height:72px;border-radius:24px;background:linear-gradient(145deg,var(--bl),var(--pu));display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px;box-shadow:0 0 0 1px rgba(26,111,255,0.3),0 20px 60px rgba(26,111,255,0.4);}
.auth-app-name{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:6px;}
.auth-app-sub{font-size:14px;color:rgba(255,255,255,0.4);text-align:center;line-height:1.5;}
.auth-bottom{background:rgba(255,255,255,0.03);border-top:1px solid var(--bd);padding:24px 24px 36px;position:relative;z-index:2;}
.auth-tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;color:rgba(255,255,255,0.4);}
.auth-tab.on{background:var(--bl);color:#fff;box-shadow:0 4px 16px rgba(26,111,255,0.4);}
.auth-inp-wrap{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.06);border:1px solid var(--bd2);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.auth-inp-ico{font-size:18px;flex-shrink:0;}
.auth-inp{flex:1;background:none;border:none;outline:none;color:#fff;font-size:14px;font-family:'Inter',sans-serif;font-weight:600;}
.auth-inp::placeholder{color:rgba(255,255,255,0.25);font-weight:400;}
.auth-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--bl),var(--bl2));color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 8px 28px rgba(26,111,255,0.42);margin-top:4px;animation:btn-glow 3s ease-in-out infinite;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:14px 0;}
.auth-div-line{flex:1;height:1px;background:var(--bd);}
.auth-div-t{font-size:11px;color:rgba(255,255,255,0.25);font-weight:600;}
.auth-social{display:flex;gap:10px;}
.auth-soc-btn{flex:1;padding:13px;border-radius:13px;background:rgba(255,255,255,0.05);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);}
/* FORM FILL */
.ff-panel{position:absolute;inset:0;border-radius:52px;z-index:250;background:var(--bg);transform:translateY(100%);transition:transform 0.42s cubic-bezier(0.32,0.72,0,1);overflow:hidden;display:flex;flex-direction:column;}
.ff-panel.open{transform:translateY(0);}
.ff-header{padding:50px 20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.ff-back{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px;}
.ff-exam-info{flex:1;}
.ff-exam-nm{font-size:15px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.ff-exam-sub{font-size:11px;color:var(--mu);margin-top:1px;}
.ff-progress-wrap{padding:14px 20px 0;flex-shrink:0;}
.ff-steps-row{display:flex;gap:4px;margin-bottom:10px;}
.ff-step-bar{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.08);transition:background 0.4s;}
.ff-step-bar.done{background:var(--gn);}
.ff-step-bar.active{background:var(--bl);}
.ff-step-lbl{font-size:11px;font-weight:700;color:var(--mu);}
.ff-step-lbl span{color:#fff;font-weight:800;}
.ff-body{flex:1;overflow-y:auto;padding:16px 20px;scrollbar-width:none;}
.ff-body::-webkit-scrollbar{display:none;}
.ff-section-t{font-size:12px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.ff-field{background:var(--card);border:1px solid var(--bd2);border-radius:12px;padding:11px 13px;margin-bottom:8px;position:relative;overflow:hidden;}
.ff-field.filling{border-color:rgba(26,111,255,0.4);box-shadow:0 0 0 2px rgba(26,111,255,0.12);}
.ff-field.done{border-color:rgba(0,200,83,0.3);}
.ff-field-lbl{font-size:10px;color:var(--mu);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px;}
.ff-field-val{font-size:13px;font-weight:700;color:#fff;min-height:19px;}
.ff-field-cursor{display:inline-block;width:2px;height:14px;background:var(--bl);animation:blink 0.8s infinite;vertical-align:middle;margin-left:2px;}
.ff-field-ai{position:absolute;top:10px;right:11px;font-size:10px;font-weight:700;color:var(--gn);display:flex;align-items:center;gap:3px;}
.ff-doc-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--bd2);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
.ff-doc-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ff-doc-nm{flex:1;font-size:12px;font-weight:700;color:#fff;}
.ff-doc-st{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
.ff-pay-card{background:linear-gradient(135deg,rgba(26,111,255,0.18),rgba(0,80,204,0.1));border:1px solid rgba(26,111,255,0.25);border-radius:16px;padding:18px;margin-bottom:12px;text-align:center;}
.ff-amount{font-size:40px;font-weight:900;color:#fff;letter-spacing:-1px;}
.ff-amount-lbl{font-size:11px;color:var(--mu);margin-top:2px;}
.ff-pay-methods{display:flex;gap:8px;margin-bottom:12px;}
.ff-pay-m{flex:1;background:var(--card);border:1px solid var(--bd2);border-radius:12px;padding:11px;text-align:center;cursor:pointer;transition:border-color 0.2s;}
.ff-pay-m.sel{border-color:var(--bl);background:rgba(26,111,255,0.1);}
.ff-pay-m-ico{font-size:20px;margin-bottom:4px;}
.ff-pay-m-t{font-size:11px;font-weight:700;color:#fff;}
.ff-submit{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--bl),var(--bl2));color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 8px 28px rgba(26,111,255,0.42);animation:btn-glow 3s ease-in-out infinite;}
.ff-success{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px;}
.ff-success-ico{font-size:64px;margin-bottom:20px;animation:pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;}
.ff-success-t{font-size:24px;font-weight:900;color:#fff;letter-spacing:-0.5px;margin-bottom:8px;text-align:center;}
.ff-success-s{font-size:13px;color:var(--mu);text-align:center;line-height:1.6;}
.ff-success-ref{margin-top:16px;background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.25);border-radius:12px;padding:10px 18px;font-size:12px;font-weight:700;color:var(--gn);}
/* APPLICATION TRACKER */
.tracker-card{margin:13px 20px 0;background:var(--card);border:1px solid var(--bd2);border-radius:20px;overflow:hidden;}
.tracker-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;}
.tracker-t{font-size:13px;font-weight:800;color:#fff;}
.tracker-ct{font-size:10px;font-weight:700;color:var(--bl);background:rgba(26,111,255,0.12);padding:3px 10px;border-radius:20px;}
.track-item{padding:12px 16px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:12px;}
.track-ico{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.track-inf{flex:1;}
.track-nm{font-size:12px;font-weight:700;color:#fff;}
.track-dt{font-size:10px;color:var(--mu);margin-top:1px;}
.track-pipeline{display:flex;align-items:center;gap:0;margin-top:8px;}
.track-step{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.track-step-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.track-step-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;text-align:center;}
.track-line{flex:1;height:2px;margin-bottom:14px;}
/* ADMIT CARD */
.admit-card{margin:0 20px 9px;background:linear-gradient(135deg,rgba(26,111,255,0.15),rgba(123,94,167,0.1));border:1px solid rgba(26,111,255,0.25);border-radius:18px;padding:14px;cursor:pointer;position:relative;overflow:hidden;}
.admit-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(26,111,255,0.2) 0%,transparent 65%);border-radius:50%;}
.admit-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.admit-ico{width:38px;height:38px;border-radius:12px;background:rgba(26,111,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.admit-nm{font-size:13px;font-weight:800;color:#fff;}
.admit-org{font-size:10px;color:var(--mu);margin-top:1px;}
.admit-badge{margin-left:auto;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;}
.admit-meta{display:flex;gap:8px;}
.admit-m{background:rgba(255,255,255,0.06);border-radius:9px;padding:7px 10px;}
.admit-m-l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:0.4px;font-weight:600;}
.admit-m-v{font-size:11px;font-weight:800;color:#fff;margin-top:2px;}
.admit-dl{width:100%;margin-top:10px;padding:9px;border-radius:11px;border:none;background:rgba(26,111,255,0.2);color:var(--bl);font-size:12px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
/* DEADLINE WIDGET */
.deadline-widget{margin:13px 20px 0;background:linear-gradient(135deg,rgba(255,59,85,0.14),rgba(255,149,0,0.08));border:1px solid rgba(255,59,85,0.22);border-radius:18px;padding:14px;}
.dw-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dw-t{font-size:13px;font-weight:800;color:#fff;flex:1;}
.dw-soon{font-size:10px;font-weight:800;color:var(--rd);background:rgba(255,59,85,0.12);padding:3px 10px;border-radius:20px;}
.dw-items{display:flex;flex-direction:column;gap:7px;}
.dw-item{display:flex;align-items:center;gap:10px;}
.dw-ico{font-size:16px;flex-shrink:0;}
.dw-nm{flex:1;font-size:12px;font-weight:700;color:#fff;}
.dw-cnt{font-size:11px;font-weight:900;letter-spacing:-0.3px;}
/* RESULT NOTIF */
.result-card{margin:0 20px 9px;background:linear-gradient(135deg,rgba(0,200,83,0.1),rgba(0,207,255,0.06));border:1px solid rgba(0,200,83,0.2);border-radius:16px;padding:13px;cursor:pointer;}
.rc-top{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.rc-ico{width:36px;height:36px;border-radius:11px;background:rgba(0,200,83,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.rc-nm{font-size:13px;font-weight:800;color:#fff;flex:1;}
.rc-new{font-size:9px;font-weight:800;color:var(--gn);background:rgba(0,200,83,0.12);padding:3px 8px;border-radius:20px;}
.rc-sub{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.5;}
/* NOTIF */
.nc{display:flex;align-items:flex-start;gap:11px;border-radius:16px;padding:14px;margin-bottom:9px;cursor:pointer;}
.nc.unread{background:rgba(26,111,255,0.07);border:1px solid rgba(26,111,255,0.17);}
.nc.read{background:var(--card);border:1px solid var(--bd);}
.nc-ico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.nc-t{font-size:12px;font-weight:700;color:#fff;line-height:1.45;}
.nc-s{font-size:11px;color:var(--mu);margin-top:3px;}
.nc-time{font-size:10px;color:rgba(255,255,255,0.2);margin-top:4px;}
.nc-pip{width:8px;height:8px;background:var(--bl);border-radius:50%;flex-shrink:0;margin-top:6px;}
/* PROC */
.proc{position:absolute;inset:0;border-radius:52px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.proc.show{opacity:1;pointer-events:all;}
.proc-ring{position:relative;width:128px;height:128px;margin-bottom:34px;}
.proc-glow{position:absolute;inset:-16px;border-radius:50%;background:radial-gradient(circle,rgba(26,111,255,0.22) 0%,transparent 65%);animation:breathe 2.2s ease-in-out infinite;}
.proc-t{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--bl),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.7px;margin-bottom:9px;}
.proc-s{font-size:13px;color:var(--mu);margin-bottom:30px;}
.proc-dots{display:flex;gap:10px;}
.pd{width:10px;height:10px;border-radius:50%;animation:bounce 1.3s ease-in-out infinite;}
/* SPLASH SCREEN */
.splash{position:absolute;inset:0;border-radius:52px;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(26,111,255,0.25) 0%,transparent 65%),#04040C;overflow:hidden;}
.splash-logo{width:88px;height:88px;border-radius:28px;background:linear-gradient(145deg,#1A6FFF,#7B5EA7);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:splash-pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;box-shadow:0 0 0 1px rgba(255,255,255,0.12),0 24px 60px rgba(26,111,255,0.5);}
.splash-name{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px;animation:fu 0.5s 0.3s ease both;}
.splash-tag{font-size:13px;color:rgba(255,255,255,0.4);margin-top:6px;animation:fu 0.5s 0.5s ease both;}
.splash-bar{width:140px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:40px;overflow:hidden;animation:fu 0.5s 0.6s ease both;}
.splash-fill{height:100%;background:linear-gradient(90deg,var(--bl),var(--cy));border-radius:2px;animation:splash-load 1.8s 0.7s ease both;}
.splash-ring{position:absolute;width:280px;height:280px;border-radius:50%;border:1px solid rgba(26,111,255,0.12);animation:spin 12s linear infinite;}
.splash-ring2{position:absolute;width:380px;height:380px;border-radius:50%;border:1px dashed rgba(26,111,255,0.07);animation:spin 20s linear reverse infinite;}
@keyframes splash-pop{from{opacity:0;transform:scale(0.3);}to{opacity:1;transform:scale(1);}}
@keyframes splash-load{from{width:0;}to{width:100%;}}
/* TAB TRANSITIONS */
.tab-content{animation:tab-in 0.28s cubic-bezier(0.32,0.72,0,1) both;}
@keyframes tab-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
/* PULL TO REFRESH */
.ptr-indicator{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;font-size:12px;font-weight:700;color:var(--bl);height:0;overflow:hidden;transition:height 0.3s;}
.ptr-indicator.show{height:44px;}
.ptr-spin{animation:spin 1s linear infinite;font-size:18px;}
.notif-panel{position:absolute;inset:0;border-radius:52px;z-index:400;background:var(--bg);transform:translateX(100%);transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);overflow:hidden;display:flex;flex-direction:column;}
.notif-panel.open{transform:translateX(0);}
.notif-panel-hdr{padding:54px 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.notif-panel-t{flex:1;font-size:17px;font-weight:900;color:#fff;letter-spacing:-0.4px;}
.notif-mark{font-size:11px;font-weight:700;color:var(--bl);cursor:pointer;}
.notif-body{flex:1;overflow-y:auto;scrollbar-width:none;padding:12px 16px;}
.notif-body::-webkit-scrollbar{display:none;}
.notif-group-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:0.9px;margin:8px 0 6px;}
.ncard{display:flex;align-items:flex-start;gap:11px;border-radius:16px;padding:13px;margin-bottom:7px;cursor:pointer;transition:transform 0.15s;}
.ncard:active{transform:scale(0.97);}
.ncard.unread{background:rgba(26,111,255,0.08);border:1px solid rgba(26,111,255,0.18);}
.ncard.read{background:var(--card);border:1px solid var(--bd);}
.ncard-ico{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ncard-body{flex:1;}
.ncard-t{font-size:12px;font-weight:700;color:#fff;line-height:1.45;}
.ncard-s{font-size:11px;color:var(--mu);margin-top:3px;line-height:1.5;}
.ncard-time{font-size:10px;color:rgba(255,255,255,0.2);margin-top:5px;}
.ncard-pip{width:8px;height:8px;background:var(--bl);border-radius:50%;flex-shrink:0;margin-top:5px;}
/* SKELETON */
.skel{border-radius:8px;background:linear-gradient(90deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 100%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 30px;text-align:center;}
/* APPLY SHEET */
.apply-sheet{position:absolute;bottom:74px;left:0;right:0;z-index:350;background:rgba(8,8,24,0.98);border-radius:32px 32px 0 0;border-top:1px solid rgba(255,255,255,0.1);padding:20px 20px 28px;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);}
.apply-sheet.open{transform:translateY(0);}
.apply-sheet-handle{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 18px;}
/* UPLOAD MODAL */
.upload-modal{position:absolute;bottom:74px;left:0;right:0;z-index:350;background:rgba(8,8,24,0.98);border-radius:32px 32px 0 0;border-top:1px solid rgba(255,255,255,0.1);padding:20px 20px 28px;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);}
.upload-modal.open{transform:translateY(0);}
.upload-zone{border:2px dashed rgba(26,111,255,0.35);border-radius:18px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:10px;background:rgba(26,111,255,0.04);cursor:pointer;margin-bottom:14px;}
.doc-type-btn{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--bd2);border-radius:14px;padding:13px 15px;cursor:pointer;margin-bottom:8px;transition:border-color 0.18s;}
.sheet-overlay{position:absolute;top:0;left:0;right:0;bottom:74px;background:rgba(0,0,0,0.5);z-index:340;opacity:0;pointer-events:none;transition:opacity 0.3s;border-radius:52px 52px 0 0;}

function Onboarding({onDone}){
  const [idx,setIdx]=useState(0);
  const s=OB_SLIDES[idx];
  const next=()=>{ if(idx<2) setIdx(idx+1); else onDone(); };
  return(
    <div className="ob-wrap">
      <div className="ob-skip" onClick={onDone}>Skip</div>
      <div className="ob-slides" style={{transform:`translateX(-${idx*33.333}%)`}}>
        {OB_SLIDES.map((sl,i)=>(
          <div key={i} className="ob-slide">
            <div className="ob-glow" style={{background:sl.glow1.c,width:sl.glow1.size,height:sl.glow1.size,left:sl.glow1.x,top:sl.glow1.y}}></div>
            <div className="ob-glow" style={{background:sl.glow2.c,width:sl.glow2.size,height:sl.glow2.size,left:sl.glow2.x,top:sl.glow2.y}}></div>
            <div className="ob-visual">
              <div className="ob-icon-wrap">
                <div className="ob-icon-ring" style={{borderColor:sl.ring1}}></div>
                <div className="ob-icon-ring2" style={{borderColor:sl.ring2}}></div>
                <div className="ob-icon" style={{background:sl.iconBg,boxShadow:`0 0 60px ${sl.glow1.c}`}}>{sl.ico}</div>
              </div>
            </div>
            <div className="ob-content">
              <div className="ob-tag">{sl.tag}</div>
              <div className="ob-h">{sl.h.split('\n').map((l,j)=><span key={j}>{l}<br/></span>)}</div>
              <div className="ob-s">{sl.s}</div>
              <div className="ob-dots">
                {OB_SLIDES.map((_,j)=>(
                  <div key={j} className={`ob-dot ${j===idx?'act':'idle'}`} style={j===idx?{background:sl.dot}:{}}></div>
                ))}
              </div>
              <button className="ob-btn" style={{background:sl.btn,boxShadow:`0 8px 28px ${sl.glow1.c}`}} onClick={()=>idx===i&&next()}>
                {sl.btnT}
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

                  <div style={{display:'flex',gap:8,animation:'cards-run 18s linear infinite',width:'max-content'}}
                    onMouseEnter={e=>e.currentTarget.style.animationPlayState='paused'}
                    onMouseLeave={e=>e.currentTarget.style.animationPlayState='running'}>
                    {[...LATEST,...LATEST].map((f,i)=>(
                      <div key={i} className="lf-card" style={{flexShrink:0}} onClick={()=>{const ex=EXAMS.find(e=>e.nm===f.nm);if(ex)setExamDetail(ex);}}>
                        <div className="lfc-top">
                          <div className="lfc-ico" style={{background:f.bg}}>{f.ico}</div>
                          <div><div className="lfc-cat" style={{color:f.catC}}>{f.cat}</div><div className="lfc-nm">{f.nm}</div></div>
                        </div>
                        <div className="lfc-meta">
                          <div className="lfc-m"><div className="lfc-mv">{f.posts}</div><div className="lfc-ml">Posts</div></div>
                          <div className="lfc-m"><div className="lfc-mv">{f.fee}</div><div className="lfc-ml">Fee</div></div>
                          <div className="lfc-m"><div className="lfc-mv" style={{color:f.urg?'var(--rd)':'var(--gd)'}}>{f.days}d</div><div className="lfc-ml">Left</div></div>
                        </div>
                        <button className="lfc-btn">Apply Now ⚡</button>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Results & Answer Keys */}
                <div className="lf-hdr" style={{paddingTop:14}}>
                  <span className="lf-title">📢 Results & Answer Keys</span>
                </div>
                <div style={{padding:'10px 20px 0'}}><ResultCards/></div>

                {/* Premium AI Assistant */}
                <div style={{margin:'13px 20px 0',background:'linear-gradient(135deg,rgba(123,94,167,0.22),rgba(26,111,255,0.14))',border:'1px solid rgba(123,94,167,0.28)',borderRadius:20,padding:16,position:'relative',overflow:'hidden'}}>
                  <div style={{position:'absolute',top:-30,right:-30,width:120,height:120,background:'radial-gradient(circle,rgba(123,94,167,0.3) 0%,transparent 65%)',borderRadius:'50%',pointerEvents:'none'}}></div>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
                    <div style={{width:46,height:46,borderRadius:16,background:'linear-gradient(145deg,rgba(123,94,167,0.5),rgba(26,111,255,0.4))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,boxShadow:'0 0 20px rgba(123,94,167,0.4)',flexShrink:0}}>🦾</div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <div style={{fontSize:13,fontWeight:900,color:'#fff'}}>Fillkaro AI</div>
                        <div style={{fontSize:9,fontWeight:800,padding:'2px 8px',borderRadius:20,background:'linear-gradient(135deg,rgba(255,184,0,0.25),rgba(255,149,0,0.15))',color:'#FFB800',border:'1px solid rgba(255,184,0,0.25)'}}>PREMIUM</div>
                      </div>
                      <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',marginTop:1}}>Tera personal exam advisor</div>
                    </div>
                    <div style={{width:8,height:8,background:'var(--gn)',borderRadius:'50%',boxShadow:'0 0 8px rgba(0,200,83,0.8)',animation:'pulse-r 1.4s infinite'}}></div>
                  </div>
                  <div style={{background:'rgba(0,0,0,0.25)',borderRadius:12,padding:'10px 12px',fontSize:12,color:'rgba(255,255,255,0.75)',lineHeight:1.6,fontWeight:500}}>
                    💡 Teri profile ke hisaab se <span style={{color:'#5599FF',fontWeight:800}}>SSC CGL 2025</span> best match hai. OBC cut-off <span style={{color:'#FFB800',fontWeight:800}}>135.2</span> hai — abhi apply karo, sirf <span style={{color:'#FF3B55',fontWeight:800}}>3 din</span> baaki hain!
                  </div>
                </div>
                <div style={{margin:'13px 20px 0',background:'linear-gradient(135deg,rgba(0,200,83,0.12),rgba(0,207,255,0.06))',border:'1px solid rgba(0,200,83,0.2)',borderRadius:18,padding:14}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                    <div style={{fontSize:22}}>📖</div>
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>Form Kaise Bharen?</div>
                      <div style={{fontSize:11,color:'var(--mu)'}}>Step-by-step guide — 2 min mein seekho</div>
                    </div>
                  </div>
                  {[{n:1,t:'Documents Upload Karo',s:'Aadhar, Photo, Marksheet — ek baar',c:'#1A6FFF'},{n:2,t:'Exam Choose Karo',s:'SSC/UPSC/Railway — filter karo',c:'#FFB800'},{n:3,t:'Apply Dabao',s:'AI auto-fill kar dega — 5 min!',c:'#00C853'}].map((step,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:i<2?8:0}}>
                      <div style={{width:28,height:28,borderRadius:9,background:`rgba(${step.c==='#1A6FFF'?'26,111,255':step.c==='#FFB800'?'255,184,0':'0,200,83'},0.18)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:900,color:step.c,flexShrink:0}}>{step.n}</div>
                      <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:'#fff'}}>{step.t}</div><div style={{fontSize:10,color:'var(--mu)'}}>{step.s}</div></div>
                      <div style={{fontSize:14,color:step.c}}>✓</div>
                    </div>
                  ))}
                </div>
                <div className="gap20"></div>
              </div>
            )}

            {/* ══ EXAMS ══ */}
            {nav==='exams'&&(
              <ExamsSection savedExams={savedExams} toggleSave={toggleSave} setExamDetail={setExamDetail} initSearch={homeSearch} clearSearch={()=>setHomeSearch('')}/>
            )}

            {/* ══ DOCS ══ */}
            {nav==='docs'&&(
              <div>
                <div style={{padding:'10px 20px 0'}} className="a0">
                  <div style={{fontSize:16,fontWeight:900,color:'#fff',letterSpacing:-0.5}}>My Documents</div>
                  <div style={{fontSize:11,color:'var(--mu)',marginTop:2}}>Saare documents ek jagah</div>
                </div>
                <div className="storage-card a1">
                  <div className="sc-row"><span className="sc-lbl">📦 Storage Used</span><span className="sc-pct">43% of 100 MB</span></div>
                  <div className="sc-bar"><div className="sc-fill"></div></div>
                  <div className="sc-chips">
                    {[['#1A6FFF','PDF'],['#00C853','Images'],['#FFB800','Others']].map(([c,l])=>(
                      <div key={l} className="sc-chip"><div className="sc-dot" style={{background:c}}></div>{l}</div>
                    ))}
                  </div>
                </div>
                <button className="upload-cta a2" style={{border:'1.5px dashed rgba(26,111,255,0.32)'}} onClick={()=>setUploadOpen(true)}>
                  ⬆️ Upload New Document
                </button>

                <div className="doc-sec-lbl">✅ Uploaded ({DOCS_OK.length})</div>
                {DOCS_OK.map((d,i)=>(
                  <div key={i} className="doc-item">
                    <div className="di-ico" style={{background:d.bg}}>{d.ico}</div>
                    <div className="di-inf"><div className="di-nm">{d.nm}</div><div className="di-mt">{d.mt}</div></div>
                    <div className="di-r"><span className="di-sz">{d.sz}</span><span className="di-st s-ok">✓ Ready</span></div>
                  </div>
                ))}
                <div className="doc-sec-lbl">⏳ Pending ({DOCS_PEND.length})</div>
                {DOCS_PEND.map((d,i)=>(
                  <div key={i} className="doc-item doc-pend">
                    <div className="di-ico" style={{background:d.bg}}>{d.ico}</div>
                    <div className="di-inf"><div className="di-nm">{d.nm}</div><div className="di-mt">{d.mt}</div></div>
                    <div className="di-r"><span className="di-st s-req">ज़रूरी</span></div>
                  </div>
                ))}
                <div className="gap20"></div>
              </div>
            )}

            {/* ══ PROFILE ══ */}
            {nav==='profile'&&(
              <div>
                <div className="prof-top a0">
                  <div className="prof-av-wrap">
                    <div className="prof-av" style={{cursor:'pointer'}} onClick={()=>setEditProfile(true)}>👨‍🎓</div>
                    <div className="prof-nm">Rahul Kumar</div>
                    <div className="prof-id">GFA-2025-04821 · Uttar Pradesh</div>
                    <div className="prof-badge">⭐ Premium Member · ₹50/Form</div>
                    <button style={{marginTop:10,padding:'8px 20px',borderRadius:22,border:'1px solid rgba(26,111,255,0.3)',background:'rgba(26,111,255,0.1)',color:'var(--bl)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}} onClick={()=>setEditProfile(true)}>✏️ Edit Profile</button>
                  </div>
                </div>
                <div className="a1">
                  <div className="p-mini-stats">
                    {[{n:'12',l:'Forms',c:'#1A6FFF'},{n:'98%',l:'Accuracy',c:'#00C853'},{n:'₹2.4K',l:'Saved',c:'#FFB800'}].map((s,i)=>(
                      <div key={i} className="pms"><div className="pms-n" style={{color:s.c}}>{s.n}</div><div className="pms-l">{s.l}</div></div>
                    ))}
                  </div>
                  <div className="sec-lbl">Personal Details</div>
                  <div className="info-blk">
                    {[{ico:'📱',l:'Phone',v:'+91 98765 43210'},{ico:'🎂',l:'Date of Birth',v:'15 Aug 2001'},{ico:'🏷️',l:'Category',v:'OBC',tag:'t-bl'},{ico:'📍',l:'State',v:'Uttar Pradesh'},{ico:'🎓',l:'Qualification',v:'B.Sc Computer Science'}].map((r,i)=>(
                      <div key={i} className="ir">
                        <div className="ir-ico">{r.ico}</div>
                        <div className="ir-inf"><div className="ir-lbl">{r.l}</div><div className="ir-val">{r.v}</div></div>
                        {r.tag&&<div className={`ir-tag ${r.tag}`}>{r.v}</div>}
                      </div>
                    ))}
                  </div>
                  <div className="sec-lbl">🎫 Admit Cards</div>
                  <div style={{padding:'0 20px 14px'}}>
                    {ADMIT_CARDS.map((ac,i)=>(
                      <div key={i} className="admit-card" style={{marginBottom:9}}>
                        <div className="admit-top">
                          <div className="admit-ico">{ac.ico}</div>
                          <div><div className="admit-nm">{ac.nm}</div><div className="admit-org">{ac.org}</div></div>
                          <div className="admit-badge" style={{background:ac.badgeBg,color:ac.badgeC}}>{ac.badge}</div>
                        </div>
                        <div className="admit-meta">
                          <div className="admit-m"><div className="admit-m-l">Exam Date</div><div className="admit-m-v">{ac.date}</div></div>
                          <div className="admit-m"><div className="admit-m-l">Center</div><div className="admit-m-v">{ac.center}</div></div>
                          <div className="admit-m"><div className="admit-m-l">Roll No.</div><div className="admit-m-v">{ac.rollNo}</div></div>
                        </div>
                        {ac.badge==='Available'&&(
                          <button className="admit-dl">⬇️ Download Admit Card</button>
                        )}
                      </div>
                    ))}
                  </div>
                  <div className="sec-lbl">Form History</div>
                  <div className="info-blk">
                    {[{ico:'📝',bg:'rgba(255,149,0,0.16)',n:'SSC CGL 2025',d:'24 Apr 2025',st:'Submitted',sc:'t-gn'},{ico:'🚂',bg:'rgba(26,111,255,0.16)',n:'RRB NTPC 2025',d:'18 Apr 2025',st:'Verified',sc:'t-bl'},{ico:'🏦',bg:'rgba(0,207,255,0.14)',n:'IBPS PO 2024',d:'02 Jan 2025',st:'Exam Done',sc:'t-gd'},{ico:'🏛️',bg:'rgba(255,59,85,0.14)',n:'UPSC CDS 2024',d:'10 Nov 2024',st:'Result Awaited',sc:'t-rd'}].map((f,i)=>(
                      <div key={i} className="ir">
                        <div className="ir-ico" style={{background:f.bg,fontSize:17}}>{f.ico}</div>
                        <div className="ir-inf"><div className="ir-val">{f.n}</div><div className="ir-lbl">{f.d}</div></div>
                        <div className={`ir-tag ${f.sc}`}>{f.st}</div>
                      </div>
                    ))}
                  </div>
                  <div className="sec-lbl">Account</div>
                  <div className="info-blk">
                    {[{ico:'🔔',l:'Notifications',v:notifEnabled?'Enabled':'Disabled',tag:notifEnabled?'t-gn':'t-rd',toggle:true},{ico:'🌐',l:'Language',v:'Hindi + English'},{ico:'🔒',l:'2FA Security',v:'Active',tag:'t-bl'},{ico:'💳',l:'Plan',v:'Premium · ₹299/mo',tag:'t-gd'}].map((r,i)=>(
                      <div key={i} className="ir" style={{cursor:r.toggle?'pointer':'default'}} onClick={()=>r.toggle&&setNotifEnabled(p=>!p)}>
                        <div className="ir-ico">{r.ico}</div>
                        <div className="ir-inf"><div className="ir-lbl">{r.l}</div><div className="ir-val">{r.v}</div></div>
                        {r.tag&&<div className={`ir-tag ${r.tag}`}>{r.toggle?(notifEnabled?'ON':'OFF'):'ON'}</div>}
                      </div>
                    ))}
                  </div>
                  <div style={{margin:'0 20px 14px'}}>
                    <button style={{width:'100%',padding:'14px',border:'1px solid rgba(255,59,85,0.25)',borderRadius:14,background:'rgba(255,59,85,0.08)',color:'var(--rd)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}} onClick={()=>setScreen('auth')}>
                      Logout 🚪
                    </button>
                  </div>
                </div>
                <div className="gap20"></div>
              </div>
            )}
          </div>
          </div>
        </div>

        {/* BOTTOM NAV */}
        <div className="bnav">
          {[
            {id:'home',ico:'🏠',lbl:'Home'},
            {id:'exams',ico:'📋',lbl:'Exams',badge:3},
            {id:'docs',ico:'📂',lbl:'My Docs'},
            {id:'profile',ico:'👤',lbl:'Profile'},
          ].map(n=>(
            <div key={n.id} className={`ni ${nav===n.id?'a':''}`} onClick={()=>switchNav(n.id)}>
              {n.badge&&nav!==n.id&&<div className="ni-badge">{n.badge}</div>}
              <div className="ni-ico">{n.ico}</div>
              <div className="ni-lbl">{n.lbl}</div>
              <div className="ni-dot"></div>
            </div>
          ))}
        </div>

        {/* SHEET OVERLAY */}
        <div className={`sheet-overlay ${(applySheet||uploadOpen)?'show':''}`} onClick={()=>{setApplySheet(null);setUploadOpen(false);}}></div>

        {/* APPLY SHEET */}
        <ApplySheet exam={applySheet} open={!!applySheet} onClose={()=>setApplySheet(null)} onConfirm={()=>{setApplySheet(null);setApplySuccess(true);setTimeout(()=>setApplySuccess(false),3000);}}/>

        {/* UPLOAD MODAL */}
        <UploadModal open={uploadOpen} onClose={()=>setUploadOpen(false)}/>

        {/* APPLY SUCCESS TOAST */}
        {applySuccess&&<div style={{position:'absolute',bottom:90,left:20,right:20,background:'rgba(0,200,83,0.15)',border:'1px solid rgba(0,200,83,0.3)',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',gap:10,zIndex:400,animation:'fu 0.4s ease both'}}><div style={{fontSize:22}}>🎉</div><div><div style={{fontSize:13,fontWeight:800,color:'#fff'}}>Form Apply Ho Gaya!</div><div style={{fontSize:11,color:'var(--mu)'}}>Confirmation SMS milega jald hi.</div></div></div>}

        {/* NOTIF PANEL */}
        <NotifPanel open={notifOpen} onClose={()=>setNotifOpen(false)}/>

        {/* EDIT PROFILE PANEL */}
        <EditProfilePanel open={editProfile} onClose={()=>setEditProfile(false)}/>

        {/* EXAM DETAIL PANEL */}
        <ExamDetailPanel exam={examDetail} onClose={()=>setExamDetail(null)} onApply={handleApply}/>

      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
<script>
function scalePhone(){
  const phone=document.querySelector('.phone');
  if(!phone) return;
  const vw=window.innerWidth,vh=window.innerHeight;
  const scale=Math.min(vw/414,vh/844,1);
  phone.style.transform=`scale(${scale})`;
}
scalePhone();
window.addEventListener('resize',scalePhone);
document.addEventListener('DOMContentLoaded',scalePhone);
</script>
</body>
</html>
