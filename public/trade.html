<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BTC/USDT Trade | Bitcovex</title>
<link rel="icon" href="/images/favicon.png">
<link rel="stylesheet" href="/mobile-nav.css">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070808;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;font-size:13px;min-height:100vh}
body.has-mobile-nav{padding-bottom:calc(64px + env(safe-area-inset-bottom))}

/* HEADER */
.hdr{background:#111b2d;display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid rgba(203,221,255,.08)}
.hdr-logo{width:28px;height:28px;border-radius:6px}
.pair-btn{background:none;border:none;color:#e2e8f0;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.pair-btn svg{width:12px;height:12px;fill:#8fa0bb}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-right svg{width:20px;height:20px;fill:#8fa0bb;cursor:pointer}
.btn-signup{background:#f68f15;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}

/* PRICE ROW */
.price-row{background:#0d1421;padding:10px 12px;border-bottom:1px solid rgba(203,221,255,.08)}
.price-main{font-size:22px;font-weight:700;line-height:1}
.price-usd{font-size:12px;color:#8fa0bb;margin-top:2px}
.price-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin-top:8px}
.stat-item{display:flex;flex-direction:column;gap:1px}
.stat-label{font-size:10px;color:#8fa0bb}
.stat-value{font-size:12px;font-weight:600}
.up{color:#1db26e}.down{color:#e84d4d}

/* TABS */
.tabs{display:flex;background:#0d1421;border-bottom:1px solid rgba(203,221,255,.08)}
.tab{flex:1;text-align:center;padding:10px 0;font-size:13px;font-weight:500;color:#8fa0bb;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab.active{color:#fff;border-bottom-color:#fff}

/* PANEL */
.panel{display:none}.panel.active{display:block}

/* CHART */
.interval-row{display:flex;overflow-x:auto;gap:2px;padding:6px 8px;background:#0d1421;border-bottom:1px solid rgba(203,221,255,.08);scrollbar-width:none}
.interval-row::-webkit-scrollbar{display:none}
.iv{background:none;border:none;color:#8fa0bb;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.iv.active{background:rgba(203,221,255,.1);color:#e2e8f0}
#chartContainer{width:100%;height:55vh;background:#070808}
.sub-tabs{display:flex;overflow-x:auto;border-bottom:1px solid rgba(203,221,255,.08);background:#0d1421;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:8px 12px;font-size:11px;color:#8fa0bb;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.sub-tab.active{color:#fff;border-bottom-color:#f68f15}
.login-msg{text-align:center;padding:32px 16px;color:#8fa0bb;font-size:13px}
.login-msg a{color:#f68f15;text-decoration:none}

/* ORDERBOOK */
.ob-controls{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#0d1421;border-bottom:1px solid rgba(203,221,255,.08)}
.ob-view-icons{display:flex;gap:4px}
.ob-view-icons button{background:none;border:1px solid rgba(203,221,255,.12);border-radius:4px;padding:4px 6px;cursor:pointer;opacity:.5}
.ob-view-icons button.active{opacity:1;border-color:#f68f15}
.ob-view-icons svg{width:14px;height:14px;fill:#e2e8f0;display:block}
.dec-sel{margin-left:auto;background:#0d1421;border:1px solid rgba(203,221,255,.12);color:#e2e8f0;border-radius:4px;padding:3px 6px;font-size:11px}
.ob-header{display:grid;grid-template-columns:1fr 1fr 1fr;padding:5px 10px;color:#8fa0bb;font-size:10px}
.ob-header span:last-child{text-align:right}
.ob-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:3px 10px;position:relative;font-size:12px}
.ob-row span:last-child{text-align:right}
.ob-bg{position:absolute;top:0;bottom:0;right:0;opacity:.12;pointer-events:none}
.ask-bg{background:#e84d4d}.bid-bg{background:#1db26e}
.ob-mid{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 10px;border-top:1px solid rgba(203,221,255,.08);border-bottom:1px solid rgba(203,221,255,.08)}
.ob-mid-price{font-size:18px;font-weight:700}
.ob-mid-usd{font-size:11px;color:#8fa0bb}

/* TRADES */
.trades-header{display:grid;grid-template-columns:1fr 1fr 1fr;padding:6px 10px;color:#8fa0bb;font-size:10px}
.trades-header span:last-child{text-align:right}
.trades-list{overflow-y:auto;max-height:calc(100vh - 300px)}
.trade-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:4px 10px;font-size:12px}
.trade-row span:last-child{text-align:right}

/* BUY/SELL BAR */
.bs-bar{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom));left:0;right:0;display:grid;grid-template-columns:1fr 1fr;z-index:100}
.btn-buy{background:#1db26e;color:#fff;border:none;height:52px;font-size:15px;font-weight:700;cursor:pointer}
.btn-sell{background:#e84d4d;color:#fff;border:none;height:52px;font-size:15px;font-weight:700;cursor:pointer}
@media(min-width:769px){.bs-bar{display:none}}

/* NAV */
.mobile-app-nav{display:none}
@media(max-width:768px){.mobile-app-nav{display:grid}}
</style>
</head>
<body class="has-mobile-nav">

<!-- HEADER -->
<div class="hdr">
  <img src="/images/bitbase-logo.png" class="hdr-logo" alt="Bitcovex" onerror="this.style.display='none'">
  <button class="pair-btn" onclick="location.href='/market'">
    BTC/USDT
    <svg viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z"/></svg>
  </button>
  <div class="hdr-right">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <button class="btn-signup" onclick="location.href='/auth'">Sign up</button>
    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </div>
</div>

<!-- PRICE ROW -->
<div class="price-row">
  <div style="display:flex;align-items:flex-start;justify-content:space-between">
    <div>
      <div class="price-main up" id="px">--</div>
      <div class="price-usd" id="pxUsd">&#x2248; $--</div>
    </div>
    <div class="price-stats">
      <div class="stat-item">
        <span class="stat-label">24H Change</span>
        <span class="stat-value" id="chg">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">24H High</span>
        <span class="stat-value" id="hi">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">24H Low</span>
        <span class="stat-value" id="lo">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">24h Vol(BTC)</span>
        <span class="stat-value" id="vol">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">24h Vol(USDT)</span>
        <span class="stat-value" id="volU">--</span>
      </div>
    </div>
  </div>
</div>

<!-- MAIN TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(0,this)">Chart</div>
  <div class="tab" onclick="switchTab(1,this)">Orders</div>
  <div class="tab" onclick="switchTab(2,this)">Trades</div>
</div>

<!-- CHART PANEL -->
<div class="panel active" id="panel0">
  <div class="interval-row">
    <button class="iv" onclick="loadChart('1m',this)">1m</button>
    <button class="iv" onclick="loadChart('5m',this)">5m</button>
    <button class="iv active" onclick="loadChart('15m',this)">15m</button>
    <button class="iv" onclick="loadChart('30m',this)">30m</button>
    <button class="iv" onclick="loadChart('1h',this)">1H</button>
    <button class="iv" onclick="loadChart('4h',this)">4H</button>
    <button class="iv" onclick="loadChart('1d',this)">1D</button>
  </div>
  <div id="chartContainer"></div>
  <div class="sub-tabs">
    <div class="sub-tab active">Open Orders</div>
    <div class="sub-tab">Order History</div>
    <div class="sub-tab">Trade History</div>
    <div class="sub-tab">Assets</div>
  </div>
  <div class="login-msg">Please <a href="/auth">log in</a> or <a href="/auth?tab=register">register</a> first</div>
</div>

<!-- ORDERS PANEL -->
<div class="panel" id="panel1">
  <div class="ob-controls">
    <div class="ob-view-icons">
      <button class="active" title="Both" onclick="setObView('both',this)">
        <svg viewBox="0 0 16 16"><rect x="0" y="1" width="7" height="2" fill="#e84d4d"/><rect x="9" y="1" width="7" height="2" fill="#1db26e"/><rect x="0" y="5" width="7" height="2" fill="#e84d4d"/><rect x="9" y="5" width="7" height="2" fill="#1db26e"/><rect x="0" y="9" width="7" height="2" fill="#e84d4d"/><rect x="9" y="9" width="7" height="2" fill="#1db26e"/></svg>
      </button>
      <button title="Sell only" onclick="setObView('sell',this)">
        <svg viewBox="0 0 16 16"><rect x="0" y="1" width="16" height="2" fill="#e84d4d"/><rect x="0" y="5" width="16" height="2" fill="#e84d4d"/><rect x="0" y="9" width="16" height="2" fill="#e84d4d"/></svg>
      </button>
      <button title="Buy only" onclick="setObView('buy',this)">
        <svg viewBox="0 0 16 16"><rect x="0" y="1" width="16" height="2" fill="#1db26e"/><rect x="0" y="5" width="16" height="2" fill="#1db26e"/><rect x="0" y="9" width="16" height="2" fill="#1db26e"/></svg>
      </button>
    </div>
    <select class="dec-sel" id="decSel" onchange="renderOB()">
      <option>0.01</option><option>0.1</option><option>1</option><option>10</option>
    </select>
  </div>
  <div class="ob-header"><span>Price(USDT)</span><span>Amount(BTC)</span><span>Total(BTC) &#x2193;</span></div>
  <div id="asks"></div>
  <div class="ob-mid">
    <span class="ob-mid-price up" id="obMidPx">--</span>
    <span class="ob-mid-usd" id="obMidUsd">--</span>
  </div>
  <div id="bids"></div>
</div>

<!-- TRADES PANEL -->
<div class="panel" id="panel2">
  <div class="trades-header"><span>Time</span><span>Price(USDT)</span><span>Amount(BTC)</span></div>
  <div class="trades-list" id="tradesList"></div>
</div>

<!-- BUY/SELL BAR -->
<div class="bs-bar">
  <button class="btn-buy" onclick="location.href='/auth'">Buy BTC</button>
  <button class="btn-sell" onclick="location.href='/auth'">Sell BTC</button>
</div>

<!-- BOTTOM NAV -->
<nav class="mobile-app-nav">
  <a href="/"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div><span class="nav-label">Home</span></a>
  <a href="/market"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 3v18h18V3H3zm16 16H5V5h14v14zM7 12h2v5H7v-5zm4-3h2v8h-2V9zm4-3h2v11h-2V6z"/></svg></div><span class="nav-label">Market</span></a>
  <a href="/trade" class="active" aria-current="page"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></div><span class="nav-label">Trade</span></a>
  <a href="/futures"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg></div><span class="nav-label">Futures</span></a>
  <a href="/assets"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg></div><span class="nav-label">Assets</span></a>
</nav>

<script>
const SYM = 'BTC_USDT';
let asks = [], bids = [], trades = [];
let chart, candleSeries, currentInterval = '15m', obView = 'both';

function g(id){ return document.getElementById(id); }
function fmt(n,dec){ return parseFloat(n||0).toLocaleString('en',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }

// --- Tabs ---
function switchTab(i, el) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', j===i));
  document.querySelectorAll('.panel').forEach((p,j) => p.classList.toggle('active', j===i));
  if(i===0 && !chart) setTimeout(initChart, 100);
}

// --- Ticker ---
function updateTicker(d) {
  const px = parseFloat(d.price||d.last||0);
  const chg = parseFloat(d.change24h||d.priceChange||d.change||0);
  const isUp = chg >= 0;
  const pxStr = fmt(px, 2);
  g('px').textContent = pxStr;
  g('px').className = 'price-main '+(isUp?'up':'down');
  g('pxUsd').textContent = '≈ $'+pxStr;
  g('chg').textContent = (isUp?'+':'')+chg.toFixed(2)+'%';
  g('chg').className = 'stat-value '+(isUp?'up':'down');
  g('hi').textContent = fmt(d.high24h||d.highPrice, 2);
  g('lo').textContent = fmt(d.low24h||d.lowPrice, 2);
  g('vol').textContent = fmt(d.vol24h||d.volume, 4);
  g('volU').textContent = fmt(d.volUsdt24h||d.quoteVolume, 0);
  g('obMidPx').textContent = pxStr;
  g('obMidPx').className = 'ob-mid-price '+(isUp?'up':'down');
  g('obMidUsd').textContent = '≈ $'+pxStr;
}

// --- Order Book ---
function setObView(v, btn) {
  obView = v;
  document.querySelectorAll('.ob-view-icons button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOB();
}

function renderOB() {
  const N = 8;
  const ar = asks.slice(0, N), br = bids.slice(0, N);
  const maxA = ar.reduce((m,r)=>Math.max(m, parseFloat(r[1]||0)), 0);
  const maxB = br.reduce((m,r)=>Math.max(m, parseFloat(r[1]||0)), 0);
  function row(r, side, max) {
    const p=parseFloat(r[0]||0), q=parseFloat(r[1]||0), t=p*q;
    const w = max>0 ? (q/max*100).toFixed(1) : 0;
    return `<div class="ob-row"><span class="${side==='ask'?'down':'up'}">${fmt(p,2)}</span><span>${q.toFixed(6)}</span><span>${t.toFixed(4)}</span><div class="ob-bg ${side==='ask'?'ask-bg':'bid-bg'}" style="width:${w}%"></div></div>`;
  }
  if(obView!=='buy') g('asks').innerHTML = ar.slice().reverse().map(r=>row(r,'ask',maxA)).join('');
  else g('asks').innerHTML = '';
  if(obView!=='sell') g('bids').innerHTML = br.map(r=>row(r,'bid',maxB)).join('');
  else g('bids').innerHTML = '';
}

// --- Trades ---
function renderTrades() {
  g('tradesList').innerHTML = trades.slice(0,40).map(t => {
    const side = (t.side||'').toLowerCase()==='sell'?'down':'up';
    const ts = t.time ? new Date(t.time).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '--';
    return `<div class="trade-row"><span>${ts}</span><span class="${side}">${fmt(t.price,2)}</span><span>${parseFloat(t.qty||t.amount||0).toFixed(6)}</span></div>`;
  }).join('');
}

// --- Chart ---
async function loadChart(iv, btn) {
  currentInterval = iv;
  document.querySelectorAll('.iv').forEach(b => b.classList.toggle('active', b===btn));
  const res = await fetch(`/api/market/klines?symbol=${SYM}&interval=${iv}&limit=200`).then(r=>r.json()).catch(()=>[]);
  const raw = Array.isArray(res) ? res : (res.data||[]);
  const data = raw.map(k => ({
    time: Math.floor((typeof k[0]==='string' ? new Date(k[0]).getTime() : k[0]) / 1000),
    open:+k[1], high:+k[2], low:+k[3], close:+k[4]
  })).filter(c=>c.time>0).sort((a,b)=>a.time-b.time);
  if(candleSeries && data.length) candleSeries.setData(data);
}

function initChart() {
  const el = g('chartContainer');
  if(chart||!el) return;
  el.style.height = '55vh';
  chart = LightweightCharts.createChart(el, {
    width: el.clientWidth, height: el.clientHeight||320,
    layout:{background:{color:'#070808'},textColor:'#8fa0bb'},
    grid:{vertLines:{color:'rgba(203,221,255,.05)'},horzLines:{color:'rgba(203,221,255,.05)'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'rgba(203,221,255,.1)'},
    timeScale:{borderColor:'rgba(203,221,255,.1)',timeVisible:true,secondsVisible:false}
  });
  candleSeries = chart.addCandlestickSeries({
    upColor:'#1db26e',downColor:'#e84d4d',
    borderUpColor:'#1db26e',borderDownColor:'#e84d4d',
    wickUpColor:'#1db26e',wickDownColor:'#e84d4d'
  });
  window.addEventListener('resize', () => chart.applyOptions({width:el.clientWidth}));
  loadChart(currentInterval, document.querySelector('.iv.active'));
}

// --- WebSocket ---
function connectWS() {
  const proto = location.protocol==='https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => {
    ['orderbook','trades','ticker'].forEach(ch =>
      ws.send(JSON.stringify({type:'subscribe',channel:ch,symbol:SYM}))
    );
  };
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      const ch = d.channel||d.type||'';
      if(ch.includes('ticker')||('price' in (d.data||d) && !ch.includes('trade') && !ch.includes('order'))) {
        updateTicker(d.data||d);
      } else if(ch.includes('orderbook')||d.asks||(d.data&&d.data.asks)) {
        const od = d.data||d;
        if(od.asks) asks = od.asks;
        if(od.bids) bids = od.bids;
        renderOB();
      } else if(ch.includes('trade')) {
        const td = d.data||d;
        if(Array.isArray(td)) trades = [...td,...trades].slice(0,100);
        else if(td.price) trades.unshift(td);
        renderTrades();
        if(candleSeries && trades[0]) {
          const t = trades[0];
          const ts = Math.floor((t.time ? new Date(t.time).getTime() : Date.now())/1000);
          try { candleSeries.update({time:ts,open:+t.price,high:+t.price,low:+t.price,close:+t.price}); } catch(_){}
        }
      }
    } catch(_){}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

// --- REST bootstrap ---
async function fetchREST() {
  const [tick, ob, tr] = await Promise.allSettled([
    fetch(`/api/market/ticker?symbol=${SYM}`).then(r=>r.json()),
    fetch(`/api/market/orderbook?symbol=${SYM}&limit=12`).then(r=>r.json()),
    fetch(`/api/market/trades?symbol=${SYM}&limit=30`).then(r=>r.json())
  ]);
  if(tick.status==='fulfilled' && tick.value) updateTicker(tick.value.data||tick.value);
  if(ob.status==='fulfilled' && ob.value) {
    const d = ob.value.data||ob.value;
    if(d.asks) asks=d.asks; if(d.bids) bids=d.bids; renderOB();
  }
  if(tr.status==='fulfilled' && tr.value) {
    trades = tr.value.data||tr.value||[]; renderTrades();
  }
}

// --- Boot ---
document.addEventListener('DOMContentLoaded', () => {
  fetchREST();
  connectWS();
  setTimeout(initChart, 200);
  setInterval(fetchREST, 15000);
});
</script>
</body>
</html>
