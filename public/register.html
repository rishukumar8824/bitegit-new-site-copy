<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register — Bitcovex</title>
  <meta name="description" content="Create your Bitcovex account">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0b0e;
      color: #e8eaf0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #131519;
      border: 1px solid #1e2029;
      border-radius: 16px;
      padding: 36px 28px 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .logo-text span {
      color: #F68F15;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: #7a7e8e;
      text-align: center;
      margin-bottom: 28px;
    }

    .step-indicator {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .step-dot {
      width: 28px;
      height: 4px;
      border-radius: 2px;
      background: #1e2029;
      transition: background 0.3s;
    }

    .step-dot.active {
      background: #F68F15;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #9094a4;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="email"],
    input[type="text"] {
      width: 100%;
      background: #0e0f13;
      border: 1px solid #1e2029;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 15px;
      color: #e8eaf0;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input[type="email"]:focus,
    input[type="text"]:focus {
      border-color: #F68F15;
    }

    input[type="email"]::placeholder,
    input[type="text"]::placeholder {
      color: #3a3e4e;
    }

    .otp-input-row {
      display: flex;
      gap: 8px;
    }

    .otp-input-row input {
      flex: 1;
      width: 100%;
      background: #0e0f13;
      border: 1px solid #1e2029;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 18px;
      font-weight: 600;
      color: #e8eaf0;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      letter-spacing: 4px;
    }

    .otp-input-row input:focus {
      border-color: #F68F15;
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-width: 18px;
      margin-top: 1px;
      accent-color: #F68F15;
      cursor: pointer;
    }

    .checkbox-row label {
      font-size: 13px;
      color: #7a7e8e;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
      line-height: 1.5;
      cursor: pointer;
    }

    .checkbox-row label a {
      color: #F68F15;
      text-decoration: none;
    }

    .checkbox-row label a:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #F68F15 0%, #e07d0a 100%);
      color: #000;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.92;
    }

    .error-msg {
      color: #ff4d4f;
      font-size: 13px;
      margin-top: 10px;
      display: none;
      padding: 10px 12px;
      background: rgba(255, 77, 79, 0.08);
      border-radius: 8px;
      border: 1px solid rgba(255, 77, 79, 0.2);
    }

    .success-msg {
      color: #52c41a;
      font-size: 13px;
      margin-top: 10px;
      display: none;
      padding: 10px 12px;
      background: rgba(82, 196, 26, 0.08);
      border-radius: 8px;
      border: 1px solid rgba(82, 196, 26, 0.2);
    }

    .divider {
      text-align: center;
      margin: 22px 0 18px;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #1e2029;
    }

    .divider span {
      position: relative;
      background: #131519;
      padding: 0 12px;
      font-size: 12px;
      color: #4a4e5e;
    }

    .link-row {
      text-align: center;
      font-size: 13px;
      color: #7a7e8e;
    }

    .link-row a {
      color: #F68F15;
      text-decoration: none;
      font-weight: 600;
    }

    .link-row a:hover {
      text-decoration: underline;
    }

    .resend-row {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: #7a7e8e;
    }

    .resend-btn {
      background: none;
      border: none;
      color: #F68F15;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }

    .resend-btn:disabled {
      color: #4a4e5e;
      cursor: default;
    }

    .step { display: none; }
    .step.active { display: block; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-screen {
      display: none;
      text-align: center;
      padding: 10px 0;
    }

    .success-screen .check-icon {
      width: 60px;
      height: 60px;
      background: rgba(82, 196, 26, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
    }

    .success-screen h2 {
      font-size: 20px;
      color: #fff;
      margin-bottom: 8px;
    }

    .success-screen p {
      font-size: 14px;
      color: #7a7e8e;
      margin-bottom: 24px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 22 26" width="28" height="32" fill="none">
        <path d="M5.40038 0H0.73112C0.327217 0 0 0.326486 0 0.729486V6.91749C0 7.32049 0.327217 7.64697 0.73112 7.64697H6.1315V0.729486C6.1315 0.326486 5.80429 0 5.40038 0Z" fill="#F68F15"/>
        <path d="M6.13151 7.64698V13.0353C6.13151 13.4383 6.45872 13.7648 6.86262 13.7648H12.2891C13.9821 13.7648 15.3546 15.1342 15.3546 16.8235C15.3546 18.5127 13.9821 19.8822 12.2891 19.8822H7.6641C6.81758 19.8822 6.1315 19.1977 6.13113 18.353V14.4939C6.13113 14.0909 5.80392 13.7644 5.40001 13.7644H0.73112C0.327217 13.7644 0 14.0909 0 14.4939V19.1523C0 19.5553 0.327217 19.8818 0.73112 19.8818H4.59854C5.44506 19.8818 6.13151 20.5667 6.13151 21.4114V25.2701C6.13151 25.6731 6.45872 25.9996 6.86262 25.9996H11.9235C17.2048 25.9996 21.4861 21.7278 21.4861 16.4584C21.4861 11.5919 17.532 7.64661 12.6546 7.64661H6.13151V7.64698Z" fill="#ffffff"/>
      </svg>
      <span class="logo-text">Bitcov<span>ex</span></span>
    </div>

    <!-- Step 1: Email -->
    <div class="step active" id="step1">
      <h1>Create Account</h1>
      <p class="subtitle">Enter your email to get started</p>

      <div class="step-indicator">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email">
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="agree">
        <label for="agree">
          I agree to the <a href="/terms.html" target="_blank">Terms of Service</a> and <a href="/privacy.html" target="_blank">Privacy Policy</a>
        </label>
      </div>

      <button class="btn btn-primary" id="sendOtpBtn" onclick="sendOtp()">Get OTP</button>
      <div class="error-msg" id="err1"></div>
    </div>

    <!-- Step 2: OTP + Name -->
    <div class="step" id="step2">
      <h1>Verify Email</h1>
      <p class="subtitle">Enter the 6-digit code sent to <strong id="emailDisplay" style="color:#e8eaf0"></strong></p>

      <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot active"></div>
      </div>

      <div class="field">
        <label>Verification Code</label>
        <div class="otp-input-row">
          <input type="text" id="otpInput" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
        </div>
      </div>

      <div class="field">
        <label for="nameInput">Full Name</label>
        <input type="text" id="nameInput" placeholder="Your name" autocomplete="name">
      </div>

      <button class="btn btn-primary" id="verifyBtn" onclick="verifyOtp()">Create Account</button>
      <div class="error-msg" id="err2"></div>

      <div class="resend-row">
        Didn't receive it? <button class="resend-btn" id="resendBtn" onclick="resendOtp()">Resend OTP</button>
        <span id="resendTimer" style="display:none"></span>
      </div>
    </div>

    <!-- Success screen -->
    <div class="success-screen" id="successScreen">
      <div class="check-icon">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24">
          <path d="M5 13l4 4L19 7" stroke="#52c41a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Email Verified!</h2>
      <p>Your email has been verified successfully.<br>You can now log in to your account.</p>
      <a href="/login.html" class="btn btn-primary" style="display:inline-block;text-decoration:none;text-align:center">Go to Login</a>
    </div>

    <div class="divider" id="loginDivider"><span>or</span></div>
    <div class="link-row" id="loginLink">
      Already have an account? <a href="/login.html">Log In</a>
    </div>
  </div>

  <script>
    let userEmail = '';
    let resendTimeout = null;

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError(id) {
      document.getElementById(id).style.display = 'none';
    }

    function setLoading(btnId, loading, text) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>' + text;
      } else {
        btn.disabled = false;
        btn.textContent = text;
      }
    }

    async function sendOtp() {
      hideError('err1');
      const email = document.getElementById('email').value.trim().toLowerCase();
      const agreed = document.getElementById('agree').checked;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('err1', 'Please enter a valid email address.');
        return;
      }
      if (!agreed) {
        showError('err1', 'Please agree to the Terms of Service and Privacy Policy.');
        return;
      }

      setLoading('sendOtpBtn', true, 'Sending...');
      try {
        const res = await fetch('/api/signup/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contact: email })
        });
        const data = await res.json();
        if (!res.ok) {
          showError('err1', data.message || 'Failed to send OTP. Please try again.');
          setLoading('sendOtpBtn', false, 'Get OTP');
          return;
        }
        userEmail = email;
        document.getElementById('emailDisplay').textContent = email;
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        startResendTimer(60);
      } catch (e) {
        showError('err1', 'Network error. Please check your connection.');
        setLoading('sendOtpBtn', false, 'Get OTP');
      }
    }

    async function verifyOtp() {
      hideError('err2');
      const code = document.getElementById('otpInput').value.trim();
      const name = document.getElementById('nameInput').value.trim();

      if (!/^\d{6}$/.test(code)) {
        showError('err2', 'Please enter the 6-digit verification code.');
        return;
      }
      if (!name || name.length < 2) {
        showError('err2', 'Please enter your full name (at least 2 characters).');
        return;
      }

      setLoading('verifyBtn', true, 'Verifying...');
      try {
        const res = await fetch('/api/signup/verify-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contact: userEmail, code, name })
        });
        const data = await res.json();
        if (!res.ok) {
          showError('err2', data.message || 'Verification failed. Please try again.');
          setLoading('verifyBtn', false, 'Create Account');
          return;
        }
        // Save token if returned (future-proof)
        if (data.token) {
          localStorage.setItem('cvx_token', data.token);
        }
        if (data.accessToken) {
          localStorage.setItem('cvx_token', data.accessToken);
        }
        // Show success screen
        document.getElementById('step2').classList.remove('active');
        document.getElementById('successScreen').style.display = 'block';
        document.getElementById('loginDivider').style.display = 'none';
        document.getElementById('loginLink').style.display = 'none';
      } catch (e) {
        showError('err2', 'Network error. Please check your connection.');
        setLoading('verifyBtn', false, 'Create Account');
      }
    }

    async function resendOtp() {
      hideError('err2');
      document.getElementById('resendBtn').disabled = true;
      try {
        const res = await fetch('/api/signup/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contact: userEmail })
        });
        const data = await res.json();
        if (!res.ok) {
          showError('err2', data.message || 'Failed to resend OTP.');
          document.getElementById('resendBtn').disabled = false;
          return;
        }
        startResendTimer(60);
      } catch (e) {
        showError('err2', 'Network error. Please try again.');
        document.getElementById('resendBtn').disabled = false;
      }
    }

    function startResendTimer(seconds) {
      const btn = document.getElementById('resendBtn');
      const timer = document.getElementById('resendTimer');
      btn.style.display = 'none';
      timer.style.display = 'inline';
      let remaining = seconds;
      timer.textContent = 'Resend in ' + remaining + 's';
      if (resendTimeout) clearInterval(resendTimeout);
      resendTimeout = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(resendTimeout);
          timer.style.display = 'none';
          btn.style.display = 'inline';
          btn.disabled = false;
        } else {
          timer.textContent = 'Resend in ' + remaining + 's';
        }
      }, 1000);
    }

    // Allow pressing Enter to advance
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendOtp();
    });
    document.addEventListener('DOMContentLoaded', () => {
      const otp = document.getElementById('otpInput');
      const name = document.getElementById('nameInput');
      if (otp) otp.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('nameInput').focus(); });
      if (name) name.addEventListener('keydown', e => { if (e.key === 'Enter') verifyOtp(); });
    });
  </script>
</body>
</html>
