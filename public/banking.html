<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#000000"/>
  <title>Assets — Bitcovex</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;font-size:14px}
    .hidden{display:none!important}

    /* ── APP SHELL ── */
    #app{position:fixed;inset:0;display:flex;flex-direction:column;background:#000}

    /* ── TOP HEADER ── */
    .top-header{display:flex;align-items:center;padding:14px 16px 10px;background:#000;flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top))}
    .btn-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 8px 0 0;line-height:1;display:flex;align-items:center}
    .header-title{flex:1;font-size:17px;font-weight:700;letter-spacing:.01em}
    .btn-header-icon{background:none;border:none;color:#8a9bb5;font-size:18px;cursor:pointer;padding:2px 4px;line-height:1}

    /* ── TAB BAR ── */
    .tab-bar{display:flex;background:#000;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.08)}
    .tab-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:#8a9bb5;font-size:13.5px;font-weight:600;padding:10px 4px;cursor:pointer;font-family:inherit;transition:color .18s,border-color .18s;white-space:nowrap}
    .tab-btn.active{color:#fff;border-bottom-color:#fff}

    /* ── SCROLL AREA ── */
    .scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .scroll-area::-webkit-scrollbar{display:none}

    /* ── OVERVIEW TAB ── */
    .overview-hero{padding:24px 16px 18px;background:#000}
    .hero-label{font-size:13px;color:#8a9bb5;display:flex;align-items:center;gap:6px;margin-bottom:6px}
    .hero-label .eye-btn{background:none;border:none;color:#8a9bb5;cursor:pointer;padding:0;font-size:16px;line-height:1;display:flex;align-items:center}
    .hero-user{font-size:12px;color:#8a9bb5;margin-bottom:4px}
    .hero-amount{font-size:34px;font-weight:700;letter-spacing:-.5px;line-height:1.15;margin-bottom:4px;min-height:42px}
    .hero-sub{font-size:12px;color:#8a9bb5;margin-bottom:16px}
    .hero-all-wallets{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;color:#8a9bb5;background:none;border:none;cursor:pointer;padding:0;font-family:inherit}
    .hero-all-wallets svg{opacity:.6}

    /* ── ACTION BUTTONS ── */
    .action-row{display:flex;padding:4px 0 20px;border-bottom:1px solid rgba(255,255,255,.07)}
    .action-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;background:none;border:none;color:#fff;cursor:pointer;padding:8px 4px;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:transform .1s}
    .action-btn:active{transform:scale(.92)}
    .action-icon{width:46px;height:46px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
    .action-icon svg{color:#00e5ff}
    .action-btn:active .action-icon{background:#1a2a2a}
    .action-label{font-size:12px;color:#ccc;font-weight:500}

    /* ── ACCOUNT CARDS ── */
    .acct-cards-row{display:flex;gap:10px;padding:16px 16px 12px}
    .acct-card{flex:1;background:#111;border-radius:14px;padding:14px;min-width:0;cursor:pointer;transition:background .15s;border:1px solid rgba(255,255,255,.06)}
    .acct-card:active{background:#1a1a1a}
    .acct-card-label{font-size:11.5px;color:#8a9bb5;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .acct-card-amount{font-size:18px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .acct-card-sub{font-size:11px;color:#8a9bb5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .acct-card-arrow{font-size:11px;color:#8a9bb5;margin-top:6px}

    /* ── FILTER TOGGLE ── */
    .filter-toggle{display:flex;gap:8px;padding:0 16px 12px}
    .filter-btn{background:#1a1a1a;border:1px solid transparent;border-radius:50px;color:#8a9bb5;font-size:12.5px;font-weight:600;padding:6px 16px;cursor:pointer;font-family:inherit;transition:all .15s}
    .filter-btn.active{background:#1e2e1e;border-color:#00e5ff;color:#00e5ff}

    /* ── SEARCH ROW ── */
    .search-row{display:flex;align-items:center;gap:8px;padding:0 16px 10px}
    .search-box{flex:1;display:flex;align-items:center;gap:6px;background:#1a1a1a;border-radius:20px;padding:8px 12px;height:36px}
    .search-box input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:13px;font-family:inherit;min-width:0}
    .search-box input::placeholder{color:#555}
    .search-box svg{flex-shrink:0;color:#555}
    .hide-zero-btn{background:none;border:1px solid rgba(255,255,255,.15);border-radius:50px;color:#8a9bb5;font-size:12px;font-weight:600;padding:6px 12px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;height:36px}
    .hide-zero-btn.active{border-color:#00e5ff;color:#00e5ff}

    /* ── COIN LIST ── */
    .coin-list{padding:0 16px}
    .coin-row{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .12s}
    .coin-row:last-child{border-bottom:none}
    .coin-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
    .coin-info{flex:1;min-width:0}
    .coin-name{font-size:14px;font-weight:700;line-height:1.2}
    .coin-full{font-size:12px;color:#8a9bb5;margin-top:1px}
    .coin-amt{text-align:right;flex-shrink:0}
    .coin-bal{font-size:14px;font-weight:600;line-height:1.2}
    .coin-usd{font-size:12px;color:#8a9bb5;margin-top:1px}
    .coin-actions{display:flex;gap:6px;margin-left:4px}
    .coin-act-btn{width:28px;height:28px;border-radius:50%;background:#1a1a1a;border:none;color:#00e5ff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
    .coin-act-btn:active{background:#1e2e2e}

    /* ── SPOT / FUNDING SCREENS ── */
    .section-header{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
    .section-title{font-size:15px;font-weight:700}
    .section-total{font-size:13px;color:#8a9bb5}
    .section-amount{font-size:26px;font-weight:700;padding:4px 16px 16px}

    /* ── HISTORY TAB ── */
    .history-filter{display:flex;gap:8px;padding:12px 16px}
    .hist-chip{background:#1a1a1a;border:none;border-radius:50px;color:#8a9bb5;font-size:12.5px;font-weight:600;padding:6px 14px;cursor:pointer;font-family:inherit}
    .hist-chip.active{background:#1e2e1e;color:#00e5ff}
    .hist-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
    .hist-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:#1a1a1a;flex-shrink:0}
    .hist-info{flex:1}
    .hist-type{font-size:14px;font-weight:600}
    .hist-date{font-size:12px;color:#8a9bb5;margin-top:2px}
    .hist-amt{text-align:right}
    .hist-val{font-size:14px;font-weight:700}
    .hist-status{font-size:11px;margin-top:2px}

    /* ── SKELETON ── */
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .skel{background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;display:inline-block}

    /* ── EMPTY STATE ── */
    .empty-state{display:flex;flex-direction:column;align-items:center;padding:60px 24px;gap:12px}
    .empty-icon{font-size:40px;opacity:.3}
    .empty-txt{font-size:13px;color:#8a9bb5;text-align:center}

    /* ── TOAST ── */
    #bk-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;color:#fff;border:1px solid rgba(255,255,255,.12);padding:9px 20px;border-radius:24px;font-size:13px;z-index:9999;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
    #bk-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div id="app">

  <!-- TOP HEADER -->
  <div class="top-header">
    <button class="btn-back" onclick="history.back()">
      <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="header-title">Assets</span>
    <button class="btn-header-icon" onclick="showToast('Coming soon')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 1 0 4.93 19.07 10 10 0 0 0 19.07 4.93Z"/></svg>
    </button>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('overview',this)">Overview</button>
    <button class="tab-btn" onclick="switchTab('spot',this)">Spot</button>
    <button class="tab-btn" onclick="switchTab('funding',this)">Funding</button>
    <button class="tab-btn" onclick="switchTab('history',this)">History</button>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scrollArea">

    <!-- ══ OVERVIEW TAB ══ -->
    <div id="tab-overview">

      <div class="overview-hero">
        <div class="hero-label">
          Total Assets (USDT)
          <button class="eye-btn" onclick="toggleHide()" id="eyeBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="hero-user" id="heroUser">@loading...</div>
        <div class="hero-amount" id="heroAmount"><span class="skel" style="width:140px;height:38px"></span></div>
        <div class="hero-sub" id="heroSub">≈ $<span id="heroUsd">—</span></div>
        <button class="hero-all-wallets" onclick="showToast('All wallets coming soon')">
          All wallets
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="action-row">
        <button class="action-btn" onclick="location.href='/wallet?page=deposit'">
          <div class="action-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v14M5 10l7 7 7-7"/><path d="M3 21h18"/></svg>
          </div>
          <span class="action-label">Deposit</span>
        </button>
        <button class="action-btn" onclick="location.href='/wallet?page=withdraw'">
          <div class="action-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 21V7M5 14l7-7 7 7"/><path d="M3 3h18"/></svg>
          </div>
          <span class="action-label">Withdraw</span>
        </button>
        <button class="action-btn" onclick="location.href='/wallet?page=transfer'">
          <div class="action-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M8 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3M12 7v10M9 10l3-3 3 3"/></svg>
          </div>
          <span class="action-label">Transfer</span>
        </button>
        <button class="action-btn" onclick="location.href='/wallet?page=record'">
          <div class="action-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 7h6M9 12h6M9 17h4"/></svg>
          </div>
          <span class="action-label">History</span>
        </button>
      </div>

      <!-- ACCOUNT CARDS -->
      <div class="acct-cards-row">
        <div class="acct-card" onclick="switchTab('spot',document.querySelector('.tab-btn:nth-child(2)'))">
          <div class="acct-card-label">SPOT ACCOUNT</div>
          <div class="acct-card-amount" id="spotAmount"><span class="skel" style="width:60px;height:20px"></span></div>
          <div class="acct-card-sub" id="spotAssets">— assets</div>
          <div class="acct-card-arrow">›</div>
        </div>
        <div class="acct-card" onclick="switchTab('funding',document.querySelector('.tab-btn:nth-child(3)'))">
          <div class="acct-card-label">FUNDING ACCOUNT</div>
          <div class="acct-card-amount" id="fundingAmount"><span class="skel" style="width:60px;height:20px"></span></div>
          <div class="acct-card-sub" id="fundingAssets">— assets</div>
          <div class="acct-card-arrow">›</div>
        </div>
      </div>

      <!-- FILTER TOGGLE -->
      <div class="filter-toggle">
        <button class="filter-btn active" id="filterSpot" onclick="setFilter('spot')">Spot</button>
        <button class="filter-btn" id="filterFunding" onclick="setFilter('funding')">Funding</button>
      </div>

      <!-- SEARCH ROW -->
      <div class="search-row">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search coin..." id="coinSearch" oninput="filterCoins(this.value)"/>
        </div>
        <button class="hide-zero-btn" id="hideZeroBtn" onclick="toggleHideZero()">Hide Zero</button>
      </div>

      <!-- COIN LIST -->
      <div class="coin-list" id="coinList">
        <!-- rendered by JS -->
      </div>
      <div style="height:32px"></div>
    </div>

    <!-- ══ SPOT TAB ══ -->
    <div id="tab-spot" class="hidden">
      <div class="section-header">
        <span class="section-title">Spot Account</span>
        <span class="section-total" id="spotTotal">Total USDT: —</span>
      </div>
      <div class="section-amount" id="spotBig">—</div>
      <div class="search-row">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search coin..." id="spotSearch" oninput="filterSpotCoins(this.value)"/>
        </div>
        <button class="hide-zero-btn" id="spotHideZeroBtn" onclick="toggleSpotHideZero()">Hide Zero</button>
      </div>
      <div class="coin-list" id="spotCoinList"></div>
      <div style="height:32px"></div>
    </div>

    <!-- ══ FUNDING TAB ══ -->
    <div id="tab-funding" class="hidden">
      <div class="section-header">
        <span class="section-title">Funding Account</span>
        <span class="section-total" id="fundingTotal">Total USDT: —</span>
      </div>
      <div class="section-amount" id="fundingBig">—</div>
      <div class="search-row">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search coin..." id="fundingSearch" oninput="filterFundingCoins(this.value)"/>
        </div>
        <button class="hide-zero-btn" id="fundingHideZeroBtn" onclick="toggleFundingHideZero()">Hide Zero</button>
      </div>
      <div class="coin-list" id="fundingCoinList"></div>
      <div style="height:32px"></div>
    </div>

    <!-- ══ HISTORY TAB ══ -->
    <div id="tab-history" class="hidden">
      <div class="history-filter">
        <button class="hist-chip active" onclick="switchHistChip('all',this)">All</button>
        <button class="hist-chip" onclick="switchHistChip('deposit',this)">Deposit</button>
        <button class="hist-chip" onclick="switchHistChip('withdraw',this)">Withdraw</button>
        <button class="hist-chip" onclick="switchHistChip('transfer',this)">Transfer</button>
      </div>
      <div id="histList"></div>
      <div style="height:32px"></div>
    </div>

  </div><!-- /scroll-area -->
</div>

<div id="bk-toast"></div>

<script>
(function(){
  // ── State ──
  var hidden = false;
  var hideZero = false;
  var spotHideZero = false;
  var fundingHideZero = false;
  var currentFilter = 'spot';
  var histFilter = 'all';
  var searchQ = '';
  var spotSearchQ = '';
  var fundingSearchQ = '';

  var COIN_COLORS = {
    USDT:'#26a17b',BTC:'#f7931a',ETH:'#627eea',BNB:'#f3ba2f',
    XRP:'#346aa9',SOL:'#9945ff',ADA:'#0033ad',AVAX:'#e84142',
    MATIC:'#8247e5',DOT:'#e6007a',DOGE:'#c2a633',LINK:'#2a5ada',
    UNI:'#ff007a',ATOM:'#2e3148',LTC:'#bfbbbb',TRX:'#e50915',
    NEAR:'#00c1de',OP:'#ff0420',ARB:'#12aaff',USDC:'#2775ca',
  };
  var COIN_SYMBOLS = {
    USDT:'₮',BTC:'₿',ETH:'Ξ',BNB:'B',XRP:'✕',SOL:'◎',ADA:'₳',
    AVAX:'A',MATIC:'M',DOT:'●',DOGE:'Ð',LINK:'⬡',UNI:'🦄',
    ATOM:'⚛',LTC:'Ł',TRX:'T',NEAR:'N',OP:'O',ARB:'A',USDC:'$',
  };

  // ── Default coins (shown before API loads) ──
  var defaultCoins = [
    {symbol:'USDT',name:'Tether USDT',spot:0,funding:0,usdRate:1},
    {symbol:'BTC',name:'Bitcoin',spot:0,funding:0,usdRate:94500},
    {symbol:'ETH',name:'Ethereum',spot:0,funding:0,usdRate:1780},
    {symbol:'BNB',name:'BNB',spot:0,funding:0,usdRate:608},
    {symbol:'SOL',name:'Solana',spot:0,funding:0,usdRate:148},
    {symbol:'XRP',name:'XRP',spot:0,funding:0,usdRate:2.18},
  ];
  var allCoins = defaultCoins.slice();
  var userName = '';
  var totalUsdt = 0;

  // ── Tab switching ──
  window.switchTab = function(tab, btn) {
    ['overview','spot','funding','history'].forEach(function(t){
      document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
    });
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    if(btn) btn.classList.add('active');
    document.getElementById('scrollArea').scrollTop = 0;
    if(tab === 'spot') renderSpotList();
    if(tab === 'funding') renderFundingList();
    if(tab === 'history') renderHistory();
  };

  // ── Toggle balance visibility ──
  window.toggleHide = function() {
    hidden = !hidden;
    document.getElementById('eyeBtn').innerHTML = hidden
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    renderHeroAmount();
    renderCoinList();
  };

  function mask(val) { return hidden ? '******' : val; }

  function renderHeroAmount() {
    var el = document.getElementById('heroAmount');
    el.textContent = mask(totalUsdt.toFixed(2));
    document.getElementById('heroSub').innerHTML = '≈ $' + mask(totalUsdt.toFixed(2));
  }

  // ── Filter (spot/funding) ──
  window.setFilter = function(f) {
    currentFilter = f;
    document.getElementById('filterSpot').classList.toggle('active', f === 'spot');
    document.getElementById('filterFunding').classList.toggle('active', f === 'funding');
    renderCoinList();
  };

  // ── Hide zero toggle ──
  window.toggleHideZero = function() {
    hideZero = !hideZero;
    document.getElementById('hideZeroBtn').classList.toggle('active', hideZero);
    renderCoinList();
  };
  window.toggleSpotHideZero = function() {
    spotHideZero = !spotHideZero;
    document.getElementById('spotHideZeroBtn').classList.toggle('active', spotHideZero);
    renderSpotList();
  };
  window.toggleFundingHideZero = function() {
    fundingHideZero = !fundingHideZero;
    document.getElementById('fundingHideZeroBtn').classList.toggle('active', fundingHideZero);
    renderFundingList();
  };

  // ── Search ──
  window.filterCoins = function(q) { searchQ = q.toLowerCase(); renderCoinList(); };
  window.filterSpotCoins = function(q) { spotSearchQ = q.toLowerCase(); renderSpotList(); };
  window.filterFundingCoins = function(q) { fundingSearchQ = q.toLowerCase(); renderFundingList(); };

  // ── Coin icon ──
  function coinIcon(sym) {
    var bg = COIN_COLORS[sym] || '#333';
    var ch = COIN_SYMBOLS[sym] || sym.slice(0,2);
    return '<div class="coin-icon" style="background:'+bg+';color:#fff">'+ch+'</div>';
  }

  // ── Render overview coin list ──
  function renderCoinList() {
    var list = document.getElementById('coinList');
    var coins = allCoins.filter(function(c){
      var bal = currentFilter === 'spot' ? c.spot : c.funding;
      if(hideZero && bal <= 0) return false;
      if(searchQ && !c.symbol.toLowerCase().includes(searchQ) && !c.name.toLowerCase().includes(searchQ)) return false;
      return true;
    });
    if(!coins.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-txt">No coins found</div></div>';
      return;
    }
    list.innerHTML = coins.map(function(c){
      var bal = currentFilter === 'spot' ? c.spot : c.funding;
      var usd = (bal * (c.usdRate||1)).toFixed(2);
      return '<div class="coin-row">'
        + coinIcon(c.symbol)
        + '<div class="coin-info"><div class="coin-name">'+c.symbol+'</div><div class="coin-full">'+c.name+'</div></div>'
        + '<div class="coin-amt"><div class="coin-bal">'+mask(bal.toFixed(4)*1)+'</div><div class="coin-usd">≈ $'+mask(usd)+'</div></div>'
        + '<div class="coin-actions">'
        + '<button class="coin-act-btn" onclick="event.stopPropagation();location.href=\'/wallet?page=deposit\'" title="Deposit"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v14M5 10l7 7 7-7"/></svg></button>'
        + '<button class="coin-act-btn" onclick="event.stopPropagation();location.href=\'/wallet?page=withdraw\'" title="Withdraw"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 21V7M5 14l7-7 7 7"/></svg></button>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  // ── Render spot list ──
  function renderSpotList() {
    var total = allCoins.reduce(function(s,c){ return s + c.spot * (c.usdRate||1); }, 0);
    document.getElementById('spotBig').textContent = mask(total.toFixed(2)) + ' USDT';
    document.getElementById('spotTotal').textContent = 'Total USDT: ' + mask(total.toFixed(2));
    var list = document.getElementById('spotCoinList');
    var coins = allCoins.filter(function(c){
      if(spotHideZero && c.spot <= 0) return false;
      if(spotSearchQ && !c.symbol.toLowerCase().includes(spotSearchQ)) return false;
      return true;
    });
    if(!coins.length){list.innerHTML='<div class="empty-state"><div class="empty-txt">No assets</div></div>';return;}
    list.innerHTML = coins.map(function(c){
      var usd = (c.spot * (c.usdRate||1)).toFixed(2);
      return '<div class="coin-row">'+coinIcon(c.symbol)
        +'<div class="coin-info"><div class="coin-name">'+c.symbol+'</div><div class="coin-full">'+c.name+'</div></div>'
        +'<div class="coin-amt"><div class="coin-bal">'+mask(c.spot.toFixed(4)*1)+'</div><div class="coin-usd">≈ $'+mask(usd)+'</div></div>'
        +'</div>';
    }).join('');
  }

  // ── Render funding list ──
  function renderFundingList() {
    var total = allCoins.reduce(function(s,c){ return s + c.funding * (c.usdRate||1); }, 0);
    document.getElementById('fundingBig').textContent = mask(total.toFixed(2)) + ' USDT';
    document.getElementById('fundingTotal').textContent = 'Total USDT: ' + mask(total.toFixed(2));
    var list = document.getElementById('fundingCoinList');
    var coins = allCoins.filter(function(c){
      if(fundingHideZero && c.funding <= 0) return false;
      if(fundingSearchQ && !c.symbol.toLowerCase().includes(fundingSearchQ)) return false;
      return true;
    });
    if(!coins.length){list.innerHTML='<div class="empty-state"><div class="empty-txt">No assets</div></div>';return;}
    list.innerHTML = coins.map(function(c){
      var usd = (c.funding * (c.usdRate||1)).toFixed(2);
      return '<div class="coin-row">'+coinIcon(c.symbol)
        +'<div class="coin-info"><div class="coin-name">'+c.symbol+'</div><div class="coin-full">'+c.name+'</div></div>'
        +'<div class="coin-amt"><div class="coin-bal">'+mask(c.funding.toFixed(4)*1)+'</div><div class="coin-usd">≈ $'+mask(usd)+'</div></div>'
        +'</div>';
    }).join('');
  }

  // ── History ──
  var histData = [];
  window.switchHistChip = function(f, btn) {
    histFilter = f;
    document.querySelectorAll('.hist-chip').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    renderHistory();
  };
  function renderHistory() {
    var list = document.getElementById('histList');
    var rows = histData.filter(function(h){ return histFilter === 'all' || h.type === histFilter; });
    if(!rows.length){
      list.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-txt">No records yet</div></div>';
      return;
    }
    var icons = {deposit:'⬇',withdraw:'⬆',transfer:'⇄'};
    var colors = {deposit:'#2ebd85',withdraw:'#ff4d4d',transfer:'#00e5ff'};
    list.innerHTML = rows.map(function(h){
      var col = colors[h.type] || '#fff';
      return '<div class="hist-row">'
        +'<div class="hist-icon" style="color:'+col+'">'+icons[h.type]+'</div>'
        +'<div class="hist-info"><div class="hist-type">'+h.symbol+' '+h.type.charAt(0).toUpperCase()+h.type.slice(1)+'</div><div class="hist-date">'+h.date+'</div></div>'
        +'<div class="hist-amt"><div class="hist-val" style="color:'+col+'">'+(h.type==='deposit'?'+':'-')+h.amount+' '+h.symbol+'</div>'
        +'<div class="hist-status" style="color:'+(h.status==='Completed'?'#2ebd85':'#8a9bb5')+'">'+h.status+'</div></div>'
        +'</div>';
    }).join('');
  }

  // ── Toast ──
  window.showToast = function(msg) {
    var t = document.getElementById('bk-toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._tm);
    t._tm = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  };

  // ── Load data from API ──
  function loadData() {
    var token = localStorage.getItem('bitcovex_token') || localStorage.getItem('token') || '';
    if(!token) {
      // Not logged in — show zeros
      totalUsdt = 0;
      document.getElementById('heroUser').textContent = '';
      document.getElementById('heroAmount').textContent = '0.00';
      document.getElementById('heroSub').innerHTML = '≈ $0.00';
      document.getElementById('spotAmount').textContent = '0.00';
      document.getElementById('spotAssets').textContent = '0 assets';
      document.getElementById('fundingAmount').textContent = '0.00';
      document.getElementById('fundingAssets').textContent = '0 assets';
      renderCoinList();
      return;
    }

    // Load wallet summary
    fetch('/api/wallet/summary', {
      headers:{ 'Authorization': 'Bearer ' + token }
    }).then(function(r){ return r.json(); }).then(function(data){
      if(data && data.coins) {
        allCoins = data.coins.map(function(c){
          return {
            symbol: c.symbol || c.coin,
            name: c.name || c.symbol,
            spot: parseFloat(c.spot||c.balance||0),
            funding: parseFloat(c.funding||0),
            usdRate: parseFloat(c.usdPrice||c.price||1)
          };
        });
      }
      if(data && data.user) {
        userName = data.user.username || data.user.email || '';
        document.getElementById('heroUser').textContent = userName ? '@'+userName : '';
      }
      var spotTotal = allCoins.reduce(function(s,c){return s+c.spot*(c.usdRate||1);},0);
      var fundTotal = allCoins.reduce(function(s,c){return s+c.funding*(c.usdRate||1);},0);
      totalUsdt = spotTotal + fundTotal;
      renderHeroAmount();
      document.getElementById('spotAmount').textContent = mask(spotTotal.toFixed(2));
      document.getElementById('spotAssets').textContent = allCoins.filter(function(c){return c.spot>0;}).length + ' assets';
      document.getElementById('fundingAmount').textContent = mask(fundTotal.toFixed(2));
      document.getElementById('fundingAssets').textContent = allCoins.filter(function(c){return c.funding>0;}).length + ' assets';
      renderCoinList();
    }).catch(function(){
      // Fallback — show zeros cleanly
      totalUsdt = 0;
      document.getElementById('heroAmount').textContent = '0.00';
      document.getElementById('heroSub').innerHTML = '≈ $0.00';
      document.getElementById('spotAmount').textContent = '0.00';
      document.getElementById('spotAssets').textContent = '0 assets';
      document.getElementById('fundingAmount').textContent = '0.00';
      document.getElementById('fundingAssets').textContent = '0 assets';
      renderCoinList();
    });

    // Load user info separately if needed
    fetch('/api/user-info', {
      headers:{ 'Authorization': 'Bearer ' + token }
    }).then(function(r){ return r.json(); }).then(function(u){
      if(u && (u.username || u.email)) {
        userName = u.username || u.email;
        document.getElementById('heroUser').textContent = '@' + userName;
      }
    }).catch(function(){});

    // Load history
    fetch('/api/deposit/history?limit=50', {
      headers:{ 'Authorization': 'Bearer ' + token }
    }).then(function(r){ return r.json(); }).then(function(d){
      if(Array.isArray(d)) {
        histData = histData.concat(d.map(function(h){
          return { type:'deposit', symbol:h.currency||h.coin||'USDT', amount:h.amount, date:formatDate(h.created_at||h.date), status:h.status||'Completed' };
        }));
      }
    }).catch(function(){});
  }

  function formatDate(d) {
    if(!d) return '';
    var dt = new Date(d);
    if(isNaN(dt)) return d;
    return dt.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'});
  }

  // ── Init ──
  renderCoinList();
  loadData();
})();
</script>
</body>
</html>
