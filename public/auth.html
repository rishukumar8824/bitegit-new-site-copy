<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Bitcovex — Login / Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="/bitegit-config.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#111318;color:#f4f8ff;font-family:'Manrope',sans-serif;-webkit-tap-highlight-color:transparent}

    /* ── Header ── */
    .bx-header{position:fixed;top:0;left:0;right:0;z-index:50;height:56px;background:#111318;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;border-bottom:1px solid rgba(255,255,255,0.06)}
    .bx-brand{display:flex;align-items:center;gap:8px;text-decoration:none}
    .bx-brand img{width:28px;height:28px;object-fit:contain}
    .bx-brand span{font-size:1.15rem;font-weight:700;color:#00FFFF;letter-spacing:0.01em}
    .bx-header-right{display:flex;align-items:center;gap:0.75rem}
    .bx-theme-btn{background:none;border:none;cursor:pointer;color:#8a9bb5;font-size:1.2rem;padding:4px;line-height:1}
    .bx-menu-btn{background:none;border:none;cursor:pointer;color:#f4f8ff;font-size:1.3rem;padding:4px;line-height:1}

    /* ── Promo banner ── */
    .bx-promo{margin-top:56px;background:linear-gradient(135deg,#0d1a2e 0%,#0a1520 50%,#061018 100%);padding:1rem 1.1rem;display:flex;align-items:center;justify-content:space-between;gap:0.75rem;min-height:90px;overflow:hidden;position:relative}
    .bx-promo::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,189,222,0.08),transparent 60%)}
    .bx-promo-text{position:relative;z-index:1}
    .bx-promo-tag{font-size:0.72rem;font-weight:600;color:#00b8d4;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
    .bx-promo-heading{font-size:1.4rem;font-weight:800;color:#fff;line-height:1.2}
    .bx-promo-heading span{color:#F8D649}
    .bx-promo-img{width:90px;height:75px;object-fit:contain;position:relative;z-index:1;flex-shrink:0}
    .bx-promo-coins{font-size:1.8rem;flex-shrink:0;position:relative;z-index:1}

    /* ── Main card ── */
    .bx-main{padding:1.5rem 1.1rem 2rem;min-height:calc(100vh - 56px - 90px)}
    .bx-form-title{font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:0.3rem}
    .bx-form-sub{font-size:0.82rem;color:#6b7a99;margin-bottom:1.4rem}

    /* ── Channel tabs (Email/Phone) ── */
    .bx-channel-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1.4rem}
    .bx-channel-tabs button{background:none;border:none;border-bottom:2px solid transparent;color:#6b7a99;font-family:'Manrope',sans-serif;font-size:0.95rem;font-weight:600;padding:0.5rem 1.1rem 0.6rem;cursor:pointer;margin-bottom:-1px;transition:color 0.15s}
    .bx-channel-tabs button.active{color:#f4f8ff;border-bottom-color:#f4f8ff}

    /* ── Form fields ── */
    .bx-field{margin-bottom:1rem}
    .bx-field-label{display:flex;justify-content:space-between;align-items:center;font-size:0.82rem;color:#8a9bb5;margin-bottom:0.4rem;font-weight:500}
    .bx-field-label a{color:#00b8d4;text-decoration:none;font-size:0.82rem}
    .bx-input-wrap{position:relative}
    .bx-input{width:100%;background:#1a1f2e;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.85rem 1rem;font-size:0.95rem;font-family:'Manrope',sans-serif;color:#f4f8ff;outline:none;transition:border-color 0.2s}
    .bx-input::placeholder{color:#3d4a60}
    .bx-input:focus{border-color:#00b8d4}
    .bx-input-eye{position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b7a99;font-size:1rem;padding:0;line-height:1}
    .bx-input-info{position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b7a99;font-size:0.8rem;padding:0;line-height:1;width:16px;height:16px;border:1px solid #6b7a99;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}

    /* ── Invite code field ── */
    .bx-invite-label{font-size:0.82rem;color:#8a9bb5;margin-bottom:0.4rem;font-weight:500;display:flex;align-items:center;gap:5px}
    .bx-invite-label span{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border:1.5px solid #6b7a99;border-radius:50%;font-size:0.62rem;font-weight:700;color:#6b7a99;flex-shrink:0}

    /* ── Checkbox agree ── */
    .bx-agree{display:flex;align-items:flex-start;gap:0.6rem;margin:1rem 0 1.2rem}
    .bx-agree input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:#00b8d4;cursor:pointer}
    .bx-agree-text{font-size:0.78rem;color:#8a9bb5;line-height:1.5}
    .bx-agree-text a{color:#00b8d4;text-decoration:none}

    /* ── reCAPTCHA placeholder ── */
    .bx-captcha{background:#1a1f2e;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.85rem 1rem;display:flex;align-items:center;gap:0.75rem;margin-bottom:1.2rem}
    .bx-captcha-check{width:20px;height:20px;border:2px solid #6b7a99;border-radius:3px;flex-shrink:0}
    .bx-captcha-text{font-size:0.88rem;color:#8a9bb5;flex:1}
    .bx-captcha-logo{font-size:0.65rem;color:#6b7a99;text-align:right;line-height:1.3}
    .bx-captcha-logo strong{display:block;color:#5a9fd4}

    /* ── Next button ── */
    .bx-next-btn{width:100%;background:#fff;color:#111;font-family:'Manrope',sans-serif;font-size:1rem;font-weight:700;padding:0.9rem;border:none;border-radius:999px;cursor:pointer;transition:background 0.2s;margin-bottom:1.2rem;position:relative;z-index:10;display:block;-webkit-appearance:none;touch-action:manipulation;}
    .bx-next-btn:hover{background:#e8edf5}
    .bx-next-btn:active{background:#d0d5df;transform:scale(0.98)}

    /* ── Bottom link ── */
    .bx-bottom-link{text-align:center;font-size:0.85rem;color:#6b7a99}
    .bx-bottom-link a{color:#00b8d4;text-decoration:none;font-weight:600}

    /* ── Error ── */
    .bx-error{background:rgba(255,95,130,0.12);border:1px solid rgba(255,95,130,0.25);border-radius:8px;padding:0.7rem 0.9rem;font-size:0.82rem;color:#ff5f82;margin-bottom:1rem;display:none}
    .bx-error.show{display:block}

    /* ── Nav Drawer ── */
    .bx-nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:80;display:none}
    .bx-nav-overlay.open{display:block}
    .bx-nav-drawer{position:fixed;top:0;right:-280px;width:280px;height:100%;background:#161b27;z-index:90;transition:right 0.3s ease;padding:1rem}
    .bx-nav-drawer.open{right:0}
    .bx-nav-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .bx-nav-head strong{font-size:1.1rem;color:#00FFFF;font-weight:700}
    .bx-nav-close{background:none;border:none;color:#8a9bb5;font-size:1.2rem;cursor:pointer}
    .bx-nav-links a{display:block;padding:0.8rem 0;color:#c0cce0;text-decoration:none;font-size:0.95rem;border-bottom:1px solid rgba(255,255,255,0.06)}
    .bx-nav-links a:hover{color:#fff}
  </style>
</head>
<body>

  <!-- Header -->
  <header class="bx-header">
    <a href="/" class="bx-brand">
      <img src="/images/bitegit-logo.png" alt="Bitcovex"/>
      <span>Bitcovex</span>
    </a>
    <div class="bx-header-right">
      <button class="bx-theme-btn" aria-label="Theme">☀</button>
      <button class="bx-menu-btn" id="bxMenuBtn" aria-label="Menu">☰</button>
    </div>
  </header>

  <!-- Nav Drawer -->
  <div class="bx-nav-overlay" id="bxNavOverlay"></div>
  <aside class="bx-nav-drawer" id="bxNavDrawer">
    <div class="bx-nav-head">
      <strong style="display:flex;align-items:center;gap:7px;">
        <img src="/images/bitegit-logo.png" alt="Bitcovex" width="26" height="26" style="display:block;object-fit:contain;flex-shrink:0;border-radius:5px;" />
        <span style="color:#00FFFF;font-size:1.1rem;font-weight:700;">Bitcovex</span>
      </strong>
      <button class="bx-nav-close" id="bxNavClose">✕</button>
    </div>
    <nav class="bx-nav-links">
      <a href="/">Home</a>
      <a href="/markets">Markets</a>
      <a href="/trade/spot/BTCUSDT">Trade</a>
      <a href="/p2p">P2P</a>
      <a href="/wallet">Assets</a>
    </nav>
  </aside>

  <!-- Promo Banner (Register only) -->
  <div class="bx-promo" id="bxPromo">
    <div class="bx-promo-text">
      <div class="bx-promo-tag">Exclusive Tasks for New Users</div>
      <div class="bx-promo-heading">Earn up to<br><span>9800 USDT!</span></div>
    </div>
    <div class="bx-promo-illustration">
      <svg width="110" height="90" viewBox="0 0 110 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Hand holding phone -->
        <rect x="30" y="20" width="36" height="55" rx="5" fill="#1a2540"/>
        <rect x="33" y="24" width="30" height="42" rx="3" fill="#0d1525"/>
        <!-- Chart on phone screen -->
        <polyline points="36,55 42,47 48,51 54,42 60,44" stroke="#19d27f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <rect x="36" y="26" width="18" height="5" rx="2" fill="#1e3a5f"/>
        <text x="36" y="31.5" font-size="4" fill="#00BDDE" font-family="Arial" font-weight="700">USDT</text>
        <!-- Floating coins -->
        <circle cx="10" cy="25" r="10" fill="#F7931A"/>
        <text x="10" y="29" text-anchor="middle" font-size="10" fill="#fff" font-family="Arial" font-weight="900">₿</text>
        <circle cx="92" cy="18" r="9" fill="#627EEA"/>
        <text x="92" y="22" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial" font-weight="900">Ξ</text>
        <circle cx="100" cy="55" r="8" fill="#F3BA2F"/>
        <text x="100" y="59" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial" font-weight="900">B</text>
        <circle cx="8" cy="65" r="7" fill="#26A17B"/>
        <text x="8" y="69" text-anchor="middle" font-size="7" fill="#fff" font-family="Arial" font-weight="900">₮</text>
        <!-- Dollar signs floating -->
        <text x="75" y="38" font-size="14" fill="#F8D649" font-family="Arial" font-weight="900" opacity="0.9">$</text>
        <text x="18" y="45" font-size="11" fill="#F8D649" font-family="Arial" font-weight="900" opacity="0.7">$</text>
        <!-- Stars/sparkles -->
        <text x="85" y="72" font-size="8" fill="#00BDDE" opacity="0.8">✦</text>
        <text x="22" y="15" font-size="7" fill="#F8D649" opacity="0.9">✦</text>
      </svg>
    </div>
  </div>

  <!-- Main -->
  <main class="bx-main" id="bxMain">
    <div id="bxFormTitle" class="bx-form-title">Register</div>
    <div id="bxFormSub" class="bx-form-sub">Join Bitcovex: Start Your Crypto Wealth Journey</div>

    <!-- Channel tabs -->
    <div class="bx-channel-tabs">
      <button class="active" id="bxEmailTab" type="button">Email</button>
      <button id="bxPhoneTab" type="button">Phone</button>
    </div>

    <!-- Error -->
    <div class="bx-error" id="bxError"></div>

    <!-- Form -->
    <form id="bxForm" novalidate>

      <!-- Email field -->
      <div class="bx-field" id="bxEmailField">
        <div class="bx-input-wrap">
          <input class="bx-input" type="email" id="bxEmail" placeholder="Please enter your email address" autocomplete="email"/>
        </div>
      </div>

      <!-- Phone field (hidden by default) -->
      <div class="bx-field" id="bxPhoneField" style="display:none">
        <div class="bx-input-wrap">
          <input class="bx-input" type="tel" id="bxPhone" placeholder="Please enter your phone number"/>
        </div>
      </div>

      <!-- Password field (login only) -->
      <div class="bx-field" id="bxPasswordField" style="display:none">
        <div class="bx-field-label">
          <span>Password</span>
          <a href="#" id="bxForgotLink">Forgot password? ›</a>
        </div>
        <div class="bx-input-wrap">
          <input class="bx-input" type="password" id="bxPassword" placeholder="Please enter your password" autocomplete="current-password"/>
          <button type="button" class="bx-input-eye" id="bxTogglePw" aria-label="Show password">👁</button>
        </div>
      </div>

      <!-- Invite code (register only) -->
      <div class="bx-field" id="bxInviteField">
        <div class="bx-invite-label">
          Invitation Code (Optional) <span>i</span>
        </div>
        <div class="bx-input-wrap">
          <input class="bx-input" type="text" id="bxInvite" placeholder="Please enter your invitation code"/>
        </div>
      </div>

      <!-- Agree checkbox (register only) -->
      <div class="bx-agree" id="bxAgreeField">
        <input type="checkbox" id="bxAgree"/>
        <label class="bx-agree-text" for="bxAgree">
          I have read and agree to Bitcovex's <a href="#">User Agreement</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>

      <!-- reCAPTCHA -->
      <div class="bx-captcha" id="bxCaptchaBox" style="cursor:pointer;" onclick="this.classList.toggle('checked');document.getElementById('bxCaptchaDone').style.display=this.classList.contains('checked')?'flex':'none';document.getElementById('bxCaptchaCheck2').style.display=this.classList.contains('checked')?'none':'block';">
        <div id="bxCaptchaCheck2" style="width:20px;height:20px;border:2px solid #6b7a99;border-radius:3px;flex-shrink:0;"></div>
        <div id="bxCaptchaDone" style="display:none;width:20px;height:20px;background:#00b8d4;border-radius:3px;flex-shrink:0;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;">✓</div>
        <span class="bx-captcha-text">I'm not a robot</span>
        <div class="bx-captcha-logo"><strong>reCAPTCHA</strong>Privacy · Terms</div>
      </div>

      <!-- Submit -->
      <button type="submit" class="bx-next-btn">Next</button>

    </form>

    <!-- Bottom link -->
    <div class="bx-bottom-link" id="bxBottomLink">
      Already have an account? <a href="#" id="bxSwitchLink">Login</a>
    </div>
  </main>

  <script>
  (function(){
    // Read mode from URL
    var params = new URLSearchParams(location.search);
    var mode = params.get('mode') === 'signup' ? 'signup' : 'login';
    var channel = 'email';

    var el = function(id){ return document.getElementById(id); }

    function setMode(m){
      mode = m;
      signupStep = 1;
      var isSignup = m === 'signup';
      el('bxPromo').style.display = isSignup ? 'flex' : 'none';
      el('bxMain').style.marginTop = isSignup ? '0' : '56px';
      el('bxFormTitle').textContent = isSignup ? 'Register' : 'Login';
      el('bxFormSub').textContent = isSignup ? 'Join Bitcovex: Start Your Crypto Wealth Journey' : '';
      el('bxPasswordField').style.display = isSignup ? 'none' : 'block';
      el('bxInviteField').style.display = isSignup ? 'block' : 'none';
      el('bxAgreeField').style.display = isSignup ? 'flex' : 'none';
      el('bxBottomLink').innerHTML = isSignup
        ? 'Already have an account? <a href="#" id="bxSwitchLink">Login</a>'
        : 'Have you got an account? <a href="#" id="bxSwitchLink">Register</a>';
      el('bxSwitchLink').onclick = function(e){ e.preventDefault(); setMode(isSignup ? 'login' : 'signup'); };
    }

    function setChannel(c){
      channel = c;
      el('bxEmailTab').classList.toggle('active', c === 'email');
      el('bxPhoneTab').classList.toggle('active', c === 'phone');
      el('bxEmailField').style.display = c === 'email' ? 'block' : 'none';
      el('bxPhoneField').style.display = c === 'phone' ? 'block' : 'none';
    }

    el('bxEmailTab').onclick = function(){ setChannel('email'); };
    el('bxPhoneTab').onclick = function(){ setChannel('phone'); };

    // Password toggle
    el('bxTogglePw').onclick = function(){
      var pw = el('bxPassword');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    };

    // Captcha handled via inline onclick on bxCaptchaBox

    // Nav drawer
    el('bxMenuBtn').onclick = function(){
      el('bxNavDrawer').classList.add('open');
      el('bxNavOverlay').classList.add('open');
    };
    el('bxNavClose').onclick = el('bxNavOverlay').onclick = function(){
      el('bxNavDrawer').classList.remove('open');
      el('bxNavOverlay').classList.remove('open');
    };

    // ── Register step state ──
    var signupStep = 1; // 1=email, 2=otp+password

    function showSignupStep2(){
      signupStep = 2;
      el('bxInviteField').style.display = 'none';
      el('bxAgreeField').style.display = 'none';
      el('bxPasswordField').style.display = 'block';
      // Add OTP field if not exists
      if(!el('bxOtpField')){
        var otpHtml = '<div class="bx-field" id="bxOtpField"><div class="bx-field-label"><span>Email Verification Code</span></div><div class="bx-input-wrap"><input class="bx-input" type="text" id="bxOtp" placeholder="Enter 6-digit code" maxlength="6" inputmode="numeric"/></div></div>';
        el('bxPasswordField').insertAdjacentHTML('beforebegin', otpHtml);
      }
      el('bxPasswordField').querySelector('label, .bx-field-label span') && (el('bxPasswordField').querySelector('.bx-field-label span').textContent = 'Set Password');
      el('bxFormSub').textContent = 'Enter the code sent to your email';
    }

    // Form submit
    el('bxForm').onsubmit = async function(e){
      e.preventDefault();
      el('bxError').classList.remove('show');
      var emailVal = el('bxEmail').value.trim();
      var pwVal = el('bxPassword').value;
      var inviteVal = el('bxInvite') ? el('bxInvite').value.trim() : '';

      if(mode === 'signup'){
        if(!emailVal){ showErr('Please enter your email address.'); return; }

        var API = (window.BITEGIT_API_BASE || '/api/v1');

        if(signupStep === 1){
          // Step 1: send OTP
          try{
            var r = await fetch(API+'/auth/signup/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:emailVal, purpose:'signup'})});
            var d = await r.json();
            if(r.ok || r.status === 200){ showSignupStep2(); return; }
            showErr(d.message || 'Failed to send code. Try again.');
          }catch(_){ showErr('Network error. Please try again.'); }
          return;
        }

        // Step 2: verify OTP + register
        var otpVal = el('bxOtp') ? el('bxOtp').value.trim() : '';
        if(!otpVal){ showErr('Please enter the verification code.'); return; }
        if(!pwVal || pwVal.length < 8){ showErr('Password must be at least 8 characters with a number.'); return; }
        try{
          var r2 = await fetch(API+'/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:emailVal, password:pwVal, code:otpVal, referralCode:inviteVal})});
          var d2 = await r2.json();
          if(r2.ok){ location.href = '/?registered=1'; return; }
          showErr(d2.message || 'Registration failed. Please try again.');
        }catch(_){ showErr('Network error. Please try again.'); }

      } else {
        // Login
        var API = (window.BITEGIT_API_BASE || '/api/v1');
        if(!emailVal){ showErr('Please enter your email address.'); return; }
        if(!pwVal){ showErr('Please enter your password.'); return; }
        try{
          var r3 = await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:emailVal, password:pwVal})});
          var d3 = await r3.json();
          if(d3.blocked){ localStorage.setItem('_bx_blocked','1'); location.href='/blocked'; return; }
          if(r3.ok){ location.href = params.get('to') || '/'; return; }
          showErr(d3.message || 'Login failed. Please check your credentials.');
        }catch(_){ showErr('Network error. Please try again.'); }
      }
    };

    function showErr(msg){ var e = el('bxError'); e.textContent = msg; e.classList.add('show'); }

    // Init
    setMode(mode);
    setChannel('email');
  })();
  </script>
</body>
</html>
