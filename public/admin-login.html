<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcovex — Admin Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060b14;
      --card: #0d1525;
      --card-border: rgba(46,189,133,0.18);
      --green: #2ebd85;
      --green2: #1fa76e;
      --green-glow: rgba(46,189,133,0.22);
      --text: #e8edf5;
      --muted: #6b7a96;
      --input-bg: #0a1120;
      --input-border: rgba(255,255,255,0.08);
      --input-focus: rgba(46,189,133,0.5);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Animated grid bg ── */
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(46,189,133,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,189,133,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Glow blobs ── */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0;
    }
    .blob-1 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(46,189,133,0.13) 0%, transparent 70%);
      top: -120px; left: -100px;
    }
    .blob-2 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(46,100,189,0.10) 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }

    /* ── Card ── */
    .card-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 36px 32px 32px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 80px rgba(0,0,0,0.55), 0 0 60px var(--green-glow);
      backdrop-filter: blur(10px);
    }

    /* ── Logo ── */
    .logo-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    }

    .logo-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #2ebd85 0%, #1a9e6e 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(46,189,133,0.45);
      flex-shrink: 0;
    }

    .logo-icon svg { width: 22px; height: 22px; }

    .logo-text {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff 0%, #a8f0d4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-badge {
      margin-left: auto;
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--green);
      background: rgba(46,189,133,0.1);
      border: 1px solid rgba(46,189,133,0.25);
      padding: 3px 8px; border-radius: 20px;
    }

    /* ── Heading ── */
    .card-title {
      font-size: 1.45rem; font-weight: 700; letter-spacing: -0.4px;
      margin-bottom: 4px; color: #fff;
    }
    .card-sub {
      font-size: 0.8rem; color: var(--muted); margin-bottom: 28px; line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      margin-bottom: 24px;
    }

    /* ── Form ── */
    .field { margin-bottom: 16px; }

    .field label {
      display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.03em;
      color: var(--muted); margin-bottom: 7px; text-transform: uppercase;
    }

    .field-inner { position: relative; }

    .field-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); width: 16px; height: 16px; pointer-events: none;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 11px;
      color: var(--text);
      font-size: 0.875rem;
      padding: 12px 14px 12px 40px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .field input::placeholder { color: #374357; }
    .field input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--input-focus);
    }

    /* 2FA smaller */
    #otpCode { letter-spacing: 0.15em; font-size: 1rem; text-align: center; }

    /* ── Button ── */
    #submitBtn {
      width: 100%; margin-top: 8px;
      background: linear-gradient(135deg, #2ebd85 0%, #1fa76e 100%);
      border: none; border-radius: 12px;
      color: #041510; font-size: 0.9rem; font-weight: 800;
      letter-spacing: 0.02em; padding: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(46,189,133,0.35);
      position: relative; overflow: hidden;
    }
    #submitBtn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    #submitBtn:hover { opacity: 0.92; box-shadow: 0 6px 28px rgba(46,189,133,0.48); }
    #submitBtn:active { transform: scale(0.985); }
    #submitBtn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* spinner inside btn */
    .btn-spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(4,21,16,0.3); border-top-color: #041510;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Message ── */
    #loginMessage {
      min-height: 18px; font-size: 0.8rem; text-align: center;
      margin-top: 12px; border-radius: 8px; padding: 0;
      transition: all 0.2s;
    }
    #loginMessage.error {
      color: #fc6060; background: rgba(252,96,96,0.08);
      border: 1px solid rgba(252,96,96,0.2); padding: 8px 12px;
    }
    #loginMessage.success {
      color: var(--green); background: rgba(46,189,133,0.08);
      border: 1px solid rgba(46,189,133,0.2); padding: 8px 12px;
    }

    /* ── Footer ── */
    .card-footer {
      margin-top: 22px; padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .footer-security {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.7rem; color: var(--muted);
    }
    .footer-security svg { width: 12px; height: 12px; color: var(--green); }
    .footer-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.45; }
    }
    .footer-status { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--muted); }

    /* ── Eye toggle ── */
    .eye-btn {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px; line-height: 0;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--text); }
    .eye-btn svg { width: 16px; height: 16px; }

    @media (max-width: 440px) {
      .card { padding: 28px 20px 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card-wrap">
    <div class="card">

      <!-- Logo -->
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 6V12C4 16.4 7.4 20.5 12 22C16.6 20.5 20 16.4 20 12V6L12 2Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 12.5L11 14.5L15 10.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">Bitcovex</span>
        <span class="logo-badge">Admin</span>
      </div>

      <h1 class="card-title">Control Panel</h1>
      <p class="card-sub">Authorized personnel only. All access is logged and monitored.</p>

      <div class="divider"></div>

      <form id="adminLoginForm" novalidate>

        <!-- Identifier -->
        <div class="field">
          <label for="identifier">Email or Username</label>
          <div class="field-inner">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input id="identifier" name="identifier" type="text" placeholder="admin" autocomplete="username" required />
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Password</label>
          <div class="field-inner">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="password" name="password" type="password" placeholder="••••••••••" autocomplete="current-password" required />
            <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- 2FA -->
        <div class="field">
          <label for="otpCode">2FA Code <span style="color:#374357;font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
          <div class="field-inner">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <input id="otpCode" name="otpCode" type="text" placeholder="— — — — — —" inputmode="numeric" maxlength="6" />
          </div>
        </div>

        <button id="submitBtn" type="submit">
          <span id="btnText">Sign In Securely</span>
          <div class="btn-spinner" id="btnSpinner"></div>
        </button>

        <div id="loginMessage"></div>
      </form>

      <!-- Footer -->
      <div class="card-footer">
        <div class="footer-security">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          256-bit encrypted
        </div>
        <div class="footer-status">
          <div class="footer-dot"></div>
          Systems Operational
        </div>
      </div>

    </div>
  </div>

  <script>
    // Eye toggle
    document.getElementById('eyeBtn').addEventListener('click', function() {
      var inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    // OTP auto-format spaces
    document.getElementById('otpCode').addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').slice(0, 6);
    });
  </script>
  <script src="/admin-login.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
