<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login — Bitcovex</title>
  <meta name="description" content="Log in to your Bitcovex account">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0b0e;
      color: #e8eaf0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #131519;
      border: 1px solid #1e2029;
      border-radius: 16px;
      padding: 36px 28px 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .logo-text span {
      color: #F68F15;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: #7a7e8e;
      text-align: center;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #9094a4;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #0e0f13;
      border: 1px solid #1e2029;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 15px;
      color: #e8eaf0;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #F68F15;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: #3a3e4e;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 44px;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #5a5e6e;
      display: flex;
      align-items: center;
    }

    .toggle-pw:hover {
      color: #9094a4;
    }

    .forgot-row {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
    }

    .forgot-row a {
      font-size: 12px;
      color: #F68F15;
      text-decoration: none;
    }

    .forgot-row a:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #F68F15 0%, #e07d0a 100%);
      color: #000;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.92;
    }

    .error-msg {
      color: #ff4d4f;
      font-size: 13px;
      margin-top: 12px;
      display: none;
      padding: 10px 12px;
      background: rgba(255, 77, 79, 0.08);
      border-radius: 8px;
      border: 1px solid rgba(255, 77, 79, 0.2);
    }

    .divider {
      text-align: center;
      margin: 22px 0 18px;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #1e2029;
    }

    .divider span {
      position: relative;
      background: #131519;
      padding: 0 12px;
      font-size: 12px;
      color: #4a4e5e;
    }

    .link-row {
      text-align: center;
      font-size: 13px;
      color: #7a7e8e;
    }

    .link-row a {
      color: #F68F15;
      text-decoration: none;
      font-weight: 600;
    }

    .link-row a:hover {
      text-decoration: underline;
    }

    .info-box {
      background: rgba(246, 143, 21, 0.06);
      border: 1px solid rgba(246, 143, 21, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #a07030;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 22 26" width="28" height="32" fill="none">
        <path d="M5.40038 0H0.73112C0.327217 0 0 0.326486 0 0.729486V6.91749C0 7.32049 0.327217 7.64697 0.73112 7.64697H6.1315V0.729486C6.1315 0.326486 5.80429 0 5.40038 0Z" fill="#F68F15"/>
        <path d="M6.13151 7.64698V13.0353C6.13151 13.4383 6.45872 13.7648 6.86262 13.7648H12.2891C13.9821 13.7648 15.3546 15.1342 15.3546 16.8235C15.3546 18.5127 13.9821 19.8822 12.2891 19.8822H7.6641C6.81758 19.8822 6.1315 19.1977 6.13113 18.353V14.4939C6.13113 14.0909 5.80392 13.7644 5.40001 13.7644H0.73112C0.327217 13.7644 0 14.0909 0 14.4939V19.1523C0 19.5553 0.327217 19.8818 0.73112 19.8818H4.59854C5.44506 19.8818 6.13151 20.5667 6.13151 21.4114V25.2701C6.13151 25.6731 6.45872 25.9996 6.86262 25.9996H11.9235C17.2048 25.9996 21.4861 21.7278 21.4861 16.4584C21.4861 11.5919 17.532 7.64661 12.6546 7.64661H6.13151V7.64698Z" fill="#ffffff"/>
      </svg>
      <span class="logo-text">Bitcov<span>ex</span></span>
    </div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to your Bitcovex account</p>

    <div class="info-box">
      New users: login auto-creates your account. Use any password (min 6 chars).
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="current-password">
        <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Show/hide password">
          <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-row">
      <a href="/forgot-password.html">Forgot Password?</a>
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Log In</button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="divider"><span>or</span></div>
    <div class="link-row">
      No account? <a href="/signup">Register</a>
    </div>
  </div>

  <script>
    let pwVisible = false;

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      pwVisible = !pwVisible;
      input.type = pwVisible ? 'text' : 'password';
      icon.innerHTML = pwVisible
        ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Logging in...';
      } else {
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    }

    async function doLogin() {
      hideError();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Please enter a valid email address.');
        return;
      }
      if (!password || password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      setLoading(true);
      try {
        const res = await fetch('/api/p2p/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.message || 'Login failed. Please try again.');
          setLoading(false);
          return;
        }
        // Save token to localStorage
        const token = data.accessToken || data.token || '';
        if (token) {
          localStorage.setItem('cvx_token', token);
        }
        // Save user info if available
        if (data.user) {
          localStorage.setItem('cvx_user', JSON.stringify(data.user));
        }
        // Redirect to P2P dashboard
        window.location.href = '/p2p';
      } catch (e) {
        showError('Network error. Please check your connection and try again.');
        setLoading(false);
      }
    }

    // Enter key support
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('email').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('password').focus();
      });
      document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });
    });
  </script>
</body>
</html>
